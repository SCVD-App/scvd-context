<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chasin' Curves</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chasin' Curves" />
  <meta name="theme-color" content="#0d0d0d" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* True full screen — dvh accounts for mobile browser chrome dynamically */
    html {
      height: 100%;
      height: -webkit-fill-available;
    }
    body {
      min-height: 100%;
      min-height: -webkit-fill-available;
      min-height: 100dvh;
      background: #0d0d0d;
      color: #f5f3ee;
      font-family: 'Josefin Sans', sans-serif;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }
    #root {
      height: 100dvh;
      height: 100vh; /* fallback */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Safe area support for notched phones */
    :root {
      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    input, select, textarea, button { font-family: inherit; }
    input[type=range] { accent-color: #C9A84C; }

    /* Prevent iOS bounce scroll */
    body { overscroll-behavior: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
