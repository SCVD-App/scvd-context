// ── ERROR BOUNDARY ───────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) {
    try {
      localStorage.setItem("mdCrashLog", JSON.stringify({
        msg: error.message, stack: error.stack?.slice(0,500), ts: new Date().toISOString()
      }));
    } catch(e) {}
  }
  render() {
    if (this.state.error) {
      return React.createElement("div", {
        style: { background:"#0a0a0a", minHeight:"100vh", padding:"30px 20px", fontFamily:"monospace", color:"#C9A84C" }
      },
        React.createElement("div", { style:{ fontSize:"14px", fontWeight:"bold", marginBottom:"16px" }}, "🔴 APP CRASH — ERROR DETAILS:"),
        React.createElement("div", { style:{ fontSize:"17px", color:"#ff4444", wordBreak:"break-all", lineHeight:"1.6", background:"#1a0000", padding:"12px", borderRadius:"8px", marginBottom:"12px" }}, this.state.error.message),
        React.createElement("div", { style:{ fontSize:"14px", color:"#555", wordBreak:"break-all", lineHeight:"1.6" }}, this.state.error.stack?.slice(0,300)),
        React.createElement("div", { style:{ marginTop:"16px", fontSize:"14px", color:"#333" }}, "Screenshot this and send to support.")
      );
    }
    return this.props.children;
  }
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
// ── VOICE ID — Pro vocal range calibration ──────────────────────────────────
// Six guided pitch slides (manual start, fixed 5s window) capture the user's
// singable frequency range. Runs its own lightweight AudioContext/Analyser —
// deliberately NOT the main recognition pipeline — so it's unaffected by
// (and doesn't feed into) the AudioContext/distortion investigation.
// Shareable card uses the same html2canvas + Web Share pattern as
// SessionReport's "Drop the Receipts".

const VOICEID_FMIN = 80, VOICEID_FMAX = 1200, VOICEID_NBINS = 40;
const VOICEID_PASS_MS = 5000;
const VOICEID_MIN_VOICED_FRAC = 0.35; // below this, pass is flagged for retry

const VOICEID_PASSES = [
  { vowel: "ah", dir: "up",   label: "\"Ahh\" — lowest to highest" },
  { vowel: "oo", dir: "down", label: "\"Ooo\" — highest to lowest" },
  { vowel: "ee", dir: "up",   label: "\"Eee\" — lowest to highest" },
  { vowel: "ah", dir: "down", label: "\"Ahh\" — highest to lowest" },
  { vowel: "oo", dir: "up",   label: "\"Ooo\" — lowest to highest" },
  { vowel: "ee", dir: "down", label: "\"Eee\" — highest to lowest" },
];

// Approximate Fach-style ranges — used only for a soft, boundary-aware
// suggestion, never a hard label.
const VOICEID_TYPES = [
  { id:"bass",     label:"Bass",           lo:82,  hi:330 },
  { id:"baritone", label:"Baritone",       lo:98,  hi:392 },
  { id:"tenor",    label:"Tenor",          lo:131, hi:494 },
  { id:"alto",     label:"Alto",           lo:175, hi:698 },
  { id:"mezzo",    label:"Mezzo-soprano",  lo:196, hi:880 },
  { id:"soprano",  label:"Soprano",        lo:262, hi:1046 },
];

function voiceIdFreqToBin(f) {
  const t = (Math.log(f) - Math.log(VOICEID_FMIN)) / (Math.log(VOICEID_FMAX) - Math.log(VOICEID_FMIN));
  return Math.max(0, Math.min(VOICEID_NBINS - 1, Math.floor(t * VOICEID_NBINS)));
}
function voiceIdBinToFreq(bin) {
  const t = bin / VOICEID_NBINS;
  return VOICEID_FMIN * Math.exp(t * (Math.log(VOICEID_FMAX) - Math.log(VOICEID_FMIN)));
}

// 5th/95th percentile range from a weighted bin histogram — this is what
// protects the reported Hz numbers from a single scratchy note or glitch.
function voiceIdPercentileRange(bins, loPct = 0.05, hiPct = 0.95) {
  const total = bins.reduce((s, c) => s + c, 0);
  if (total === 0) return null;
  let cum = 0, loBin = 0, hiBin = bins.length - 1;
  for (let i = 0; i < bins.length; i++) {
    cum += bins[i];
    if (cum / total >= loPct) { loBin = i; break; }
  }
  cum = 0;
  for (let i = bins.length - 1; i >= 0; i--) {
    cum += bins[i];
    if (cum / total >= (1 - hiPct)) { hiBin = i; break; }
  }
  return {
    loBin, hiBin,
    loHz: Math.round(voiceIdBinToFreq(loBin)),
    hiHz: Math.round(voiceIdBinToFreq(Math.min(bins.length - 1, hiBin + 1))),
  };
}

function voiceIdSuggestType(loHz, hiHz) {
  const overlaps = VOICEID_TYPES.filter(t => loHz <= t.hi && hiHz >= t.lo);
  if (overlaps.length === 0) return { primary: null, overlaps: [] };
  const mid = (loHz + hiHz) / 2;
  overlaps.sort((a, b) => Math.abs((a.lo + a.hi) / 2 - mid) - Math.abs((b.lo + b.hi) / 2 - mid));
  return { primary: overlaps[0], overlaps: overlaps.slice(0, 3) };
}

// Display-only: clip bins outside the reported range, then a light 3-bin
// moving average. The raw combinedBins (used for the numbers above) are
// never mutated — this only affects what gets drawn.
function voiceIdSmoothForDisplay(bins, loBin, hiBin) {
  const clipped = bins.map((c, i) => (i >= loBin && i <= hiBin) ? c : 0);
  return clipped.map((c, i, arr) => {
    const a = arr[i - 1] ?? c, b = arr[i + 1] ?? c;
    return (a + c * 2 + b) / 4;
  });
}

function voiceIdDiagnostics(combinedBins, loBin, hiBin, passes) {
  let midRangeGap = false;
  for (let i = loBin + 2; i < hiBin - 2; i++) {
    if (combinedBins[i] < 2 && combinedBins[i - 2] > 4 && combinedBins[i + 2] > 4) { midRangeGap = true; break; }
  }
  const ascending = passes.filter(p => p.dir === "up" && p.status === "ok" && p.ampTrace && p.ampTrace.length > 8);
  let breathDropoff = false;
  if (ascending.length) {
    const drops = ascending.map(p => {
      const half = Math.floor(p.ampTrace.length / 2);
      const firstAvg = p.ampTrace.slice(0, half).reduce((a, b) => a + b, 0) / half;
      const lastAvg  = p.ampTrace.slice(half).reduce((a, b) => a + b, 0) / (p.ampTrace.length - half);
      return firstAvg > 0 ? (firstAvg - lastAvg) / firstAvg : 0;
    });
    breathDropoff = (drops.reduce((a, b) => a + b, 0) / drops.length) > 0.35;
  }
  let tensionSpike = false;
  for (const p of ascending) {
    if (!p.pitchTrace || p.pitchTrace.length < 6) continue;
    const tail = p.pitchTrace.slice(-6);
    const pitchSpread = Math.max(...tail) - Math.min(...tail);
    const ampTailAvg  = p.ampTrace.slice(-6).reduce((a, b) => a + b, 0) / 6;
    const ampFirstAvg = p.ampTrace.slice(0, 6).reduce((a, b) => a + b, 0) / 6;
    if (pitchSpread < 15 && ampTailAvg > ampFirstAvg * 1.4) { tensionSpike = true; break; }
  }
  const octaveSpan = Math.log2(voiceIdBinToFreq(hiBin) / voiceIdBinToFreq(loBin));
  return { midRangeGap, breathDropoff, tensionSpike, narrow: octaveSpan < 1 };
}

function voiceIdDiagnosticTip({ midRangeGap, breathDropoff, tensionSpike, narrow }) {
  if (midRangeGap)   return "There's a gap in the middle of your range — that often means a break between chest and head voice. A vocal coach can help smooth that transition.";
  if (tensionSpike)  return "Your top notes show some strain. Try relaxing your jaw and keeping your throat open as you climb, rather than pushing harder.";
  if (breathDropoff) return "Your higher notes faded as you ran out of air. Diaphragmatic breathing — filling from the belly, not the chest — gives you more support to sustain them.";
  if (narrow)        return "Still finding your full range is completely normal. Regular practice, good posture, and a proper warm-up will open it up over time.";
  return null;
}

function VoiceIdCapture({ passIndex, onPassComplete }) {
  const pass = VOICEID_PASSES[passIndex];
  const [capturing, setCapturing] = useState(false);
  const [progress,  setProgress]  = useState(0);
  const [liveBins,  setLiveBins]  = useState(() => new Array(VOICEID_NBINS).fill(0));
  const [retryMsg,  setRetryMsg]  = useState("");
  const streamRef = useRef(null), ctxRef = useRef(null), rafRef = useRef(null);

  const stopAll = () => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    if (ctxRef.current && ctxRef.current.state !== "closed") ctxRef.current.close();
  };
  useEffect(() => stopAll, []);

  const start = async () => {
    setRetryMsg("");
    const bins = new Array(VOICEID_NBINS).fill(0);
    const pitchTrace = [], ampTrace = [];
    let voicedFrames = 0, totalFrames = 0;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
      streamRef.current = stream;
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      ctxRef.current = ctx;
      const src = ctx.createMediaStreamSource(stream);
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      src.connect(analyser);
      const buf = new Float32Array(analyser.fftSize);
      setCapturing(true);
      const startTime = performance.now();

      const finish = () => {
        stopAll();
        setCapturing(false);
        const voicedFrac = totalFrames ? voicedFrames / totalFrames : 0;
        if (voicedFrac < VOICEID_MIN_VOICED_FRAC) {
          setRetryMsg("That one didn't capture cleanly — phone mics are surprisingly sensitive to background noise. Let's try that pass again.");
          setLiveBins(new Array(VOICEID_NBINS).fill(0));
          return;
        }
        onPassComplete({ ...pass, bins, pitchTrace, ampTrace, status: "ok" });
      };

      const tick = () => {
        const now = performance.now();
        const t = Math.min(1, (now - startTime) / VOICEID_PASS_MS);
        setProgress(t);
        analyser.getFloatTimeDomainData(buf);
        const rms = Math.sqrt(buf.reduce((s, v) => s + v * v, 0) / buf.length);
        totalFrames++;
        const freq = rms > 0.01 ? detectPitch(buf, ctx.sampleRate) : null;
        if (freq && freq >= VOICEID_FMIN && freq <= VOICEID_FMAX) {
          voicedFrames++;
          const bin = voiceIdFreqToBin(freq);
          bins[bin]++;
          pitchTrace.push(freq);
          ampTrace.push(rms);
          setLiveBins(prev => { const next = prev.slice(); next[bin] = Math.min(60, next[bin] + 1.5); return next; });
        }
        if (t < 1) { rafRef.current = requestAnimationFrame(tick); }
        else finish();
      };

      rafRef.current = requestAnimationFrame(tick);
    } catch (err) {
      setCapturing(false);
      setRetryMsg("Couldn't access your mic — check mic permissions and try again.");
    }
  };

  return (
    <div style={{ padding: "24px 20px", textAlign: "center" }}>
      <div style={{ fontSize: "11px", letterSpacing: "0.3em", color: "#666", fontFamily: "'Courier New',monospace", marginBottom: "6px" }}>
        PASS {passIndex + 1} OF {VOICEID_PASSES.length}
      </div>
      <div style={{ fontSize: "20px", color: "#C9A84C", fontFamily: "Georgia,serif", marginBottom: "20px" }}>
        {pass.label}
      </div>

      <div style={{ height: "120px", display: "flex", alignItems: "flex-end", gap: "2px", marginBottom: "20px" }}>
        {liveBins.map((h, i) => (
          <div key={i} style={{ flex: 1, height: `${h}px`, background: "#C9A84C", borderRadius: "1px 1px 0 0", transition: "height 0.05s linear" }} />
        ))}
      </div>

      {!capturing && !retryMsg && (
        <button onClick={start} style={{ padding: "14px 32px", borderRadius: "999px", border: "1px solid #554020", background: "rgba(201,168,76,0.12)", color: "#C9A84C", fontFamily: "'Courier New',monospace", letterSpacing: "0.15em", fontSize: "14px", cursor: "pointer" }}>
          ▶ START
        </button>
      )}

      {capturing && (
        <div style={{ width: "64px", height: "64px", borderRadius: "50%", border: "3px solid #333", borderTopColor: "#C9A84C", margin: "0 auto", transform: `rotate(${progress * 360}deg)`, transition: "transform 0.05s linear" }} />
      )}

      {retryMsg && (
        <div>
          <div style={{ fontSize: "13px", color: "#999", marginBottom: "16px", maxWidth: "280px", margin: "0 auto 16px" }}>{retryMsg}</div>
          <button onClick={start} style={{ padding: "12px 28px", borderRadius: "999px", border: "1px solid #554020", background: "rgba(201,168,76,0.12)", color: "#C9A84C", fontFamily: "'Courier New',monospace", letterSpacing: "0.15em", fontSize: "13px", cursor: "pointer" }}>
            ▶ TRY AGAIN
          </button>
        </div>
      )}

      <div style={{ fontSize: "12px", color: "#555", marginTop: "24px", maxWidth: "280px", margin: "24px auto 0" }}>
        Press start, then slide smoothly from your lowest comfortable note to your highest on an "{pass.vowel === "ah" ? "Ahh" : pass.vowel === "oo" ? "Ooo" : "Eee"}" sound. No wrong answers — just go as far as feels natural.
      </div>
    </div>
  );
}

function VoiceIdResults({ passes, onClose, onRedo }) {
  const cardRef = useRef(null);
  const [snapping, setSnapping] = useState(false);
  const [showTip, setShowTip] = useState(false);

  const combinedBins = new Array(VOICEID_NBINS).fill(0);
  passes.forEach(p => p.bins.forEach((c, i) => combinedBins[i] += c));
  const range = voiceIdPercentileRange(combinedBins) || { loBin: 0, hiBin: VOICEID_NBINS - 1, loHz: VOICEID_FMIN, hiHz: VOICEID_FMAX };
  const display = voiceIdSmoothForDisplay(combinedBins, range.loBin, range.hiBin);
  const maxBin = Math.max(...display, 1);
  const { primary, overlaps } = voiceIdSuggestType(range.loHz, range.hiHz);
  const diagnostics = voiceIdDiagnostics(combinedBins, range.loBin, range.hiBin, passes);
  const diagTip = voiceIdDiagnosticTip(diagnostics);

  const vowelRanges = {};
  ["ah", "oo", "ee"].forEach(v => {
    const vBins = new Array(VOICEID_NBINS).fill(0);
    passes.filter(p => p.vowel === v).forEach(p => p.bins.forEach((c, i) => vBins[i] += c));
    const r = voiceIdPercentileRange(vBins);
    if (r) vowelRanges[v] = r;
  });
  const eeVsAh = vowelRanges.ee && vowelRanges.ah && vowelRanges.ee.hiHz < vowelRanges.ah.hiHz;

  const shareCard = async () => {
    if (!cardRef.current || snapping) return;
    setSnapping(true);
    try {
      const canvas = await html2canvas(cardRef.current, { backgroundColor: "#0d0d0d", scale: 2, useCORS: true, logging: false });
      canvas.toBlob(async (blob) => {
        try {
          const file = new File([blob], "my-vocal-range.png", { type: "image/png" });
          if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: "My vocal range", text: "Found my vocal range on Mic Drop \uD83C\uDFA4" });
          } else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "my-vocal-range.png";
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
          }
        } catch (e) { console.log("Share cancelled:", e); }
      }, "image/png");
    } catch (e) { console.error("Card snapshot failed:", e); }
    finally { setSnapping(false); }
  };

  return (
    <div style={{ padding: "20px", textAlign: "center" }}>
      <div ref={cardRef} style={{ background: "#0d0d0d", borderRadius: "16px", padding: "24px 20px", maxWidth: "340px", margin: "0 auto" }}>
        <div style={{ fontSize: "11px", letterSpacing: "0.2em", color: "#8a8a86", textTransform: "uppercase", marginBottom: "16px" }}>My vocal range</div>
        <div style={{ height: "140px", display: "flex", alignItems: "flex-end", gap: "2px", marginBottom: "10px" }}>
          {display.map((h, i) => <div key={i} style={{ flex: 1, height: `${(h / maxBin) * 130}px`, background: "#C9A84C", borderRadius: "1px 1px 0 0" }} />)}
        </div>
        <div style={{ fontSize: "24px", fontWeight: "500", color: "#fff", fontFamily: "Georgia,serif" }}>{range.loHz}\u2013{range.hiHz} Hz</div>
        {primary && (
          <div style={{ fontSize: "13px", color: "#C9A84C", marginTop: "4px" }}>
            {primary.label} range{overlaps.length > 1 ? ` — overlaps ${overlaps.slice(1).map(o => o.label).join(" and ")}` : ""}
          </div>
        )}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: "18px", paddingTop: "14px", borderTop: "1px solid #2c2c2a" }}>
          <div style={{ textAlign: "left" }}>
            <div style={{ fontSize: "13px", fontWeight: "500", color: "#fff" }}>Mic Drop</div>
            <div style={{ fontSize: "10px", color: "#8a8a86" }}>micdrop.app</div>
          </div>
        </div>
      </div>

      <button onClick={shareCard} disabled={snapping} style={{ marginTop: "16px", padding: "12px 28px", borderRadius: "999px", border: "1px solid #554020", background: "rgba(201,168,76,0.12)", color: "#C9A84C", fontFamily: "'Courier New',monospace", letterSpacing: "0.1em", fontSize: "13px", cursor: "pointer" }}>
        {snapping ? "..." : "\uD83D\uDCE4 SAVE / SHARE"}
      </button>

      {eeVsAh && (
        <div style={{ fontSize: "13px", color: "#999", marginTop: "20px", maxWidth: "300px", margin: "20px auto 0", lineHeight: "1.6" }}>
          You'll notice we didn't ask for an "eye" sound — narrow vowels like "ee" and "eye" pull your voice higher and can feel strained near the top. Opening them toward "ah" is a classic singer's trick if it helps you reach comfortably.
        </div>
      )}

      {diagTip && !showTip && (
        <button onClick={() => setShowTip(true)} style={{ display: "block", margin: "16px auto 0", background: "none", border: "none", color: "#666", fontSize: "13px", textDecoration: "underline", cursor: "pointer" }}>
          Want a quick tip to help open up your range?
        </button>
      )}
      {showTip && diagTip && (
        <div style={{ fontSize: "13px", color: "#999", marginTop: "12px", maxWidth: "300px", margin: "12px auto 0", lineHeight: "1.6" }}>{diagTip}</div>
      )}

      <div style={{ display: "flex", gap: "16px", justifyContent: "center", marginTop: "28px" }}>
        <button onClick={onRedo} style={{ background: "none", border: "none", color: "#666", fontFamily: "'Courier New',monospace", fontSize: "13px", letterSpacing: "0.1em", cursor: "pointer" }}>REDO</button>
        <button onClick={onClose} style={{ background: "none", border: "none", color: "#C9A84C", fontFamily: "'Courier New',monospace", fontSize: "13px", letterSpacing: "0.1em", cursor: "pointer" }}>DONE</button>
      </div>
    </div>
  );
}

function VoiceIdModal({ onClose }) {
  const [stage, setStage] = useState("intro"); // intro | pass | results
  const [passes, setPasses] = useState(() => {
    try { const saved = localStorage.getItem("micDrop_voiceIdProgress"); return saved ? JSON.parse(saved) : []; }
    catch { return []; }
  });

  useEffect(() => {
    if (passes.length > 0 && passes.length < VOICEID_PASSES.length) {
      localStorage.setItem("micDrop_voiceIdProgress", JSON.stringify(passes));
    }
  }, [passes]);

  const handlePassComplete = (data) => {
    const next = [...passes, data];
    setPasses(next);
    if (next.length >= VOICEID_PASSES.length) {
      localStorage.removeItem("micDrop_voiceIdProgress");
      setStage("results");
    }
  };

  const handleRedo = () => {
    localStorage.removeItem("micDrop_voiceIdProgress");
    setPasses([]);
    setStage("intro");
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.92)", zIndex: 200, overflowY: "auto", display: "flex", flexDirection: "column" }}>
      <button onClick={onClose} style={{ position: "absolute", top: "16px", right: "20px", background: "none", border: "none", color: "#666", fontSize: "20px", cursor: "pointer", zIndex: 1 }}>✕</button>

      {stage === "intro" && (
        <div style={{ margin: "auto", padding: "20px", textAlign: "center", maxWidth: "340px" }}>
          <div style={{ fontSize: "12px", letterSpacing: "0.3em", color: "#C9A84C", fontFamily: "'Courier New',monospace", marginBottom: "10px" }}>✦ INNER CIRCLE</div>
          <div style={{ fontSize: "24px", color: "#fff", fontFamily: "Georgia,serif", marginBottom: "16px" }}>Now that you're in — let's get to know your voice.</div>
          <div style={{ fontSize: "14px", color: "#999", lineHeight: "1.7", marginBottom: "28px" }}>
            Six short passes, about 90 seconds. We'll guide you through some vocal slides to map your true range — and tell you where your voice sits, Bass to Soprano.
          </div>
          <button onClick={() => setStage("pass")} style={{ padding: "14px 36px", borderRadius: "999px", border: "1px solid #554020", background: "rgba(201,168,76,0.12)", color: "#C9A84C", fontFamily: "'Courier New',monospace", letterSpacing: "0.15em", fontSize: "14px", cursor: "pointer" }}>
            {passes.length > 0 ? "CONTINUE" : "BEGIN"}
          </button>
        </div>
      )}

      {stage === "pass" && (
        <VoiceIdCapture passIndex={passes.length} onPassComplete={handlePassComplete} />
      )}

      {stage === "results" && (
        <VoiceIdResults passes={passes} onClose={onClose} onRedo={handleRedo} />
      )}
    </div>
  );
}

function MicDrop() {
  const [roomLevel,   setRoomLevel]   = useState(65);
  const [voxLevel,    setVoxLevel]    = useState(70);
  const [armed,       setArmed]       = useState(false);
  const [roomMeter,   setRoomMeter]   = useState(0);
  const [voxMeter,    setVoxMeter]    = useState(0);
  const [roomPeak,    setRoomPeak]    = useState(0);
  const [voxPeak,     setVoxPeak]     = useState(0);
  const [pitchCents,  setPitchCents]  = useState(null);
  const [smoothCents, setSmoothCents] = useState(null);
  const [clipping,    setClipping]    = useState(false);
  const [trackInfo,   setTrackInfo]   = useState(null);
  const [lastTrackKey,setLastTrackKey]= useState(null);
  const [statusMsg,   setStatusMsg]   = useState("");

  // ── DEBUG OVERLAY — tester-facing diagnostic log ──
  // Toggle: tap the footer version text 5x quickly. Never enabled by default.
  const [showDebug,   setShowDebug]   = useState(false);
  const [debugLog,     setDebugLog]    = useState([]);
  const [lastMimeType, setLastMimeType]= useState(null);
  const debugTapCount = useRef(0);
  const debugTapTimer = useRef(null);
  const pushDebug = useCallback((label, detail) => {
    setDebugLog(prev => [
      { t: new Date().toLocaleTimeString(), label, detail: typeof detail === "string" ? detail : JSON.stringify(detail) },
      ...prev,
    ].slice(0, 40)); // cap at 40 entries so it never bloats
  }, []);
  useEffect(() => {
    const onErr = (e) => pushDebug("window.onerror", e?.message || String(e));
    const onRej = (e) => pushDebug("unhandledrejection", e?.reason?.message || String(e?.reason || e));
    window.addEventListener("error", onErr);
    window.addEventListener("unhandledrejection", onRej);
    return () => {
      window.removeEventListener("error", onErr);
      window.removeEventListener("unhandledrejection", onRej);
    };
  }, [pushDebug]);
  const handleVersionTap = useCallback(() => {
    debugTapCount.current += 1;
    clearTimeout(debugTapTimer.current);
    debugTapTimer.current = setTimeout(() => { debugTapCount.current = 0; }, 1500);
    if (debugTapCount.current >= 5) {
      debugTapCount.current = 0;
      setShowDebug(s => !s);
    }
  }, []);
  const shareDebugLog = useCallback(async () => {
    const ua = navigator.userAgent;
    const lines = [
      `Mic Drop debug log — ${new Date().toLocaleString()}`,
      `UA: ${ua}`,
      `Last mimeType: ${lastMimeType || "n/a"}`,
      "",
      ...debugLog.map(d => `[${d.t}] ${d.label}: ${d.detail}`),
    ].join("\n");
    try {
      if (navigator.share) await navigator.share({ text: lines, title: "Mic Drop debug log" });
      else { await navigator.clipboard.writeText(lines); setStatusMsg("Debug log copied to clipboard"); setTimeout(()=>setStatusMsg(""),3000); }
    } catch {} // user cancelled share sheet — not an error
  }, [debugLog, lastMimeType]);

  const wakeLock = useRef(null); // Screen Wake Lock — keeps AudioContext alive while armed

  // ── SCREEN WAKE LOCK — keeps the AudioContext alive when the phone is dashboard-mounted ──
  // Mobile browsers suspend background/inactive-screen AudioContexts to save power.
  // Without this, MicDrop silently stops processing ~60s after the screen locks
  // (no charger plugged in, driving), which was being misread as "distortion improves
  // when screen is off" — it's actually the app going dormant, not behaving better.
  const requestWakeLock = useCallback(async () => {
    try {
      if ("wakeLock" in navigator) {
        wakeLock.current = await navigator.wakeLock.request("screen");
        pushDebug("wakeLock", "acquired");
        wakeLock.current.addEventListener("release", () => {
          pushDebug("wakeLock", "released (system)");
        });
      } else {
        pushDebug("wakeLock", "unsupported on this browser");
      }
    } catch (err) {
      pushDebug("wakeLock request failed", `${err.name}: ${err.message}`);
    }
  }, [pushDebug]);

  const releaseWakeLock = useCallback(async () => {
    try {
      if (wakeLock.current) {
        await wakeLock.current.release();
        wakeLock.current = null;
      }
    } catch {} // already released — not an error
  }, []);

  // Wake Locks are auto-released by the OS whenever the tab is backgrounded
  // (screen off, app-switch, etc). Re-acquire on return to foreground if still armed,
  // and log the visibility + AudioContext state each time — this is the hard evidence
  // for the distortion investigation, not a guess.
  useEffect(() => {
    const onVisibility = async () => {
      const ctxState = audioCtx.current ? audioCtx.current.state : "no-context";
      pushDebug("visibilitychange", `${document.visibilityState} · audioCtx: ${ctxState} · armed: ${armed}`);
      if (document.visibilityState === "visible" && armed) {
        if (audioCtx.current && audioCtx.current.state === "suspended") {
          try { await audioCtx.current.resume(); pushDebug("audioCtx", "resumed on visible"); }
          catch (err) { pushDebug("audioCtx resume failed", err.message); }
        }
        requestWakeLock();
      }
    };
    document.addEventListener("visibilitychange", onVisibility);
    return () => document.removeEventListener("visibilitychange", onVisibility);
  }, [armed, requestWakeLock, pushDebug]);

  // Identification phase: null | "capturing" | "counting" | "sending" | "enriching"
  const [idPhase,     setIdPhase]     = useState(null);
  const [countdown,   setCountdown]   = useState(null);
  // Session log — array of { title, artist, accuracy, samples }
  const [sessionLog,  setSessionLog]  = useState([]);
  const [currentSamples, setCurrentSamples] = useState([]);
  const [showReport,       setShowReport]       = useState(false);
  const [showSplash,       setShowSplash]       = useState(false);
  const [showProfile,      setShowProfile]      = useState(false);
  const [showAbout,        setShowAbout]        = useState(false);
  const [showDressingRoom, setShowDressingRoom] = useState(false);
  const [showVoiceId,      setShowVoiceId]      = useState(false);
  const [showOnboarding,   setShowOnboarding]   = useState(() => {
    try { return !localStorage.getItem("micDrop_onboarded"); }
    catch { return true; }
  });
  const [profile,     setProfile]     = useState(() => {
    try {
      const saved = localStorage.getItem("micDrop_profile");
      return saved ? JSON.parse(saved) : { name:"", photo:null, cardStyle:"circle", preset:"gold" };
    } catch { return { name:"", photo:null, cardStyle:"circle", preset:"gold" }; }
  });

  // ── SPOTIFY (Beta) — connection state ──
  // "connected"   — we have a token and believe it's valid
  // "connecting"  — mid-OAuth redirect round trip
  // "error"       — last attempt failed (slot full, denied, exchange failed, etc)
  // null          — never connected
  const [spotifyStatus, setSpotifyStatus] = useState(() => {
    try { return localStorage.getItem("micDrop_spotifyToken") ? "connected" : null; }
    catch { return null; }
  });
  const [spotifyError, setSpotifyError] = useState(null);
  // Live playback state from Spotify's own polling — null until we've heard from
  // the API at least once. Drives the play/pause button's icon and target action.
  const [spotifyPlaying, setSpotifyPlaying] = useState(null);
  const [spotifyPlaybackMsg, setSpotifyPlaybackMsg] = useState(""); // Premium-required / no-device messaging

  const connectSpotify = useCallback(() => {
    if (!SPOTIFY_BETA_ENABLED) return;
    // CSRF guard — verified against sessionStorage when Spotify redirects back
    const state = `${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
    try { sessionStorage.setItem("micDrop_spotifyOauthState", state); } catch {}
    const params = new URLSearchParams({
      client_id:     SPOTIFY_CLIENT_ID,
      response_type: "code",
      redirect_uri:  SPOTIFY_REDIRECT_URI,
      scope:         SPOTIFY_SCOPES,
      state,
    });
    setSpotifyStatus("connecting");
    window.location.href = `${SPOTIFY_AUTH_URL}?${params.toString()}`;
  }, []);

  const disconnectSpotify = useCallback(() => {
    try { localStorage.removeItem("micDrop_spotifyToken"); } catch {}
    setSpotifyStatus(null);
    setSpotifyError(null);
    setSpotifyPlaying(null);
    spotifyTrackIdRef.current = null;
  }, []);

  // Returns a valid access token, transparently refreshing via the worker if the
  // stored one is expired or about to expire. Returns null if there's nothing
  // usable (never connected, or refresh failed — in which case we disconnect).
  const getValidSpotifyToken = useCallback(async () => {
    let raw;
    try { raw = localStorage.getItem("micDrop_spotifyToken"); } catch { return null; }
    if (!raw) return null;
    let tok;
    try { tok = JSON.parse(raw); } catch { return null; }

    const REFRESH_BUFFER_MS = 60000; // refresh a minute early rather than cutting it fine
    if (tok.expires_at && Date.now() < tok.expires_at - REFRESH_BUFFER_MS) {
      return tok.access_token;
    }
    if (!tok.refresh_token) { disconnectSpotify(); return null; }

    try {
      const res = await fetch(`${PROXY_BASE_URL}/spotify/refresh`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ refresh_token: tok.refresh_token }),
      });
      if (!res.ok) throw new Error(`refresh failed: ${res.status}`);
      const data = await res.json();
      const merged = {
        ...tok,
        ...data,
        // Spotify often omits refresh_token on a refresh response — keep the old one if so
        refresh_token: data.refresh_token || tok.refresh_token,
        expires_at: Date.now() + (data.expires_in || 3600) * 1000,
      };
      localStorage.setItem("micDrop_spotifyToken", JSON.stringify(merged));
      pushDebug("spotify", "token refreshed");
      return merged.access_token;
    } catch (e) {
      pushDebug("spotify refresh error", e.message);
      setSpotifyStatus("error");
      setSpotifyError("Spotify session expired — please reconnect");
      return null;
    }
  }, [disconnectSpotify, pushDebug]);

  // Polls Spotify for the currently-playing track. This is the fix for the
  // "song ID still checking against the previous song, now in a different key"
  // problem — instead of waiting up to RECOGNITION_INTERVAL for a fresh AudD
  // fingerprint, we know the instant Spotify says the track changed.
  // Deliberately reads lastTrackKeyRef/trackInfoRef rather than the state values
  // directly — this function gets called from inside a setInterval whose closure
  // is fixed at arm-time, so anything it needs to be current on must come from a
  // ref, not a closed-over state variable (see the matching fix in recognizeTrack).
  const pollSpotifyNowPlaying = useCallback(async () => {
    const token = await getValidSpotifyToken();
    if (!token) return;
    try {
      const res = await fetch("https://api.spotify.com/v1/me/player/currently-playing", {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.status === 204) { spotifyTrackIdRef.current = null; setSpotifyPlaying(false); return; } // nothing playing
      if (res.status === 401) {
        pushDebug("spotify", "401 on currently-playing — forcing reconnect");
        disconnectSpotify();
        return;
      }
      if (!res.ok) return;
      const data = await res.json();
      const item = data?.item;
      if (!item || !data.is_playing) { spotifyTrackIdRef.current = null; setSpotifyPlaying(!!data?.is_playing); return; }
      setSpotifyPlaying(true);
      if (item.id === spotifyTrackIdRef.current) return; // unchanged since last poll
      spotifyTrackIdRef.current = item.id;

      const title  = item.name;
      const artist = item.artists?.[0]?.name || "Unknown";
      const key    = `${title}||${artist}`;
      if (key === lastTrackKeyRef.current) return; // Spotify's id changed but title/artist didn't (rare, but cheap to guard)

      if (trackInfoRef.current) {
        setCurrentSamples(prev => { commitSongToLog(trackInfoRef.current, prev); return []; });
      }
      setIdPhase("enriching");
      try {
        const er = await fetch(`${PROXY_BASE_URL}/enrich`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, artist }),
        });
        const ed = await er.json();
        setTrackInfo({ title, artist, key: ed.key || "Unknown", bpm: ed.bpm || "—", genre: ed.genre || "", tip: ed.tip || "" });
      } catch {
        setTrackInfo({ title, artist, key: "—", bpm: "—", genre: "", tip: "" });
      }
      setLastTrackKey(key);
      setIdPhase(null);
      pushDebug("spotify track change", `${title} — ${artist}`);
    } catch (e) {
      pushDebug("spotify poll error", e.message);
    }
  }, [getValidSpotifyToken, commitSongToLog, disconnectSpotify, pushDebug]);

  // Remote play/pause on whatever device Spotify considers active — doesn't touch
  // MicDrop's own audio graph at all, just tells Spotify what to do via its API.
  // Spotify restricts this endpoint to Premium accounts; free accounts get a 403
  // with reason PREMIUM_REQUIRED, which we surface as a plain message rather than
  // a raw error.
  const toggleSpotifyPlayback = useCallback(async () => {
    const token = await getValidSpotifyToken();
    if (!token) return;
    const wasPlaying = spotifyPlaying;
    const endpoint = wasPlaying ? "pause" : "play";
    try {
      const res = await fetch(`https://api.spotify.com/v1/me/player/${endpoint}`, {
        method: "PUT",
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.ok) {
        // Spotify's play/pause can legitimately return various 2xx codes depending
        // on device state — don't gate success on exactly 204. Rather than guess
        // the new state optimistically, ask Spotify directly a beat later so the
        // icon reflects reality even if our guess would've been wrong.
        setSpotifyPlaybackMsg("");
        setTimeout(() => pollSpotifyNowPlaying(), 800);
        return;
      }
      if (res.status === 403) {
        pushDebug("spotify playback", "403 — likely Premium required");
        setSpotifyPlaybackMsg("Playback control needs Spotify Premium");
        setTimeout(() => setSpotifyPlaybackMsg(""), 5000);
        return;
      }
      if (res.status === 404) {
        pushDebug("spotify playback", "404 — no active device");
        setSpotifyPlaybackMsg("Open Spotify and start playback first");
        setTimeout(() => setSpotifyPlaybackMsg(""), 5000);
        return;
      }
      const body = await res.json().catch(() => ({}));
      pushDebug("spotify playback error", `${res.status}: ${body?.error?.message || "unknown"}`);
      setSpotifyPlaybackMsg("Couldn't reach Spotify — try again");
      setTimeout(() => setSpotifyPlaybackMsg(""), 5000);
    } catch (e) {
      pushDebug("spotify playback error", e.message);
    }
  }, [getValidSpotifyToken, spotifyPlaying, pushDebug, pollSpotifyNowPlaying]);

  // Handle the redirect back from Spotify (?code=...&state=... in the URL)
  useEffect(() => {
    const url = new URL(window.location.href);
    const code  = url.searchParams.get("code");
    const state = url.searchParams.get("state");
    const err   = url.searchParams.get("error");
    if (!code && !err) return; // nothing to do — normal page load

    // Clean the URL immediately so a refresh doesn't replay the exchange
    url.searchParams.delete("code");
    url.searchParams.delete("state");
    url.searchParams.delete("error");
    window.history.replaceState({}, "", url.toString());

    if (err) {
      pushDebug("spotify auth", `denied or failed: ${err}`);
      setSpotifyStatus("error");
      setSpotifyError(err === "access_denied" ? "Connection cancelled" : err);
      return;
    }

    let expectedState = null;
    try { expectedState = sessionStorage.getItem("micDrop_spotifyOauthState"); } catch {}
    if (!state || state !== expectedState) {
      pushDebug("spotify auth", "state mismatch — possible CSRF, aborting exchange");
      setSpotifyStatus("error");
      setSpotifyError("Security check failed — please try connecting again");
      return;
    }

    // TODO: worker-side token exchange route not built yet.
    // Needs a Cloudflare Worker route (e.g. POST /spotify/exchange) that takes this
    // `code`, calls Spotify's /api/token with the Client Secret (never exposed here),
    // and returns { access_token, refresh_token, expires_in } for us to store.
    (async () => {
      try {
        const res = await fetch(`${PROXY_BASE_URL}/spotify/exchange`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code, redirect_uri: SPOTIFY_REDIRECT_URI }),
        });
        if (!res.ok) throw new Error(`exchange failed: ${res.status}`);
        const data = await res.json();
        // Spotify gives expires_in (seconds from now) — convert to an absolute
        // timestamp so getValidSpotifyToken can check it later without re-deriving.
        const stored = { ...data, expires_at: Date.now() + (data.expires_in || 3600) * 1000 };
        localStorage.setItem("micDrop_spotifyToken", JSON.stringify(stored));
        setSpotifyStatus("connected");
        pushDebug("spotify auth", "connected successfully");
      } catch (e) {
        pushDebug("spotify exchange error", e.message);
        setSpotifyStatus("error");
        setSpotifyError("Couldn't finish connecting — worker exchange route not live yet");
      }
    })();
  }, [pushDebug]);

  const [activeUsers, setActiveUsers] = useState(null);
  const pingTimer    = useRef(null);
  const sessionId    = useRef(`${Date.now()}_${Math.random().toString(36).slice(2,8)}`);
  const voxPeakTimer   = useRef(null);
  const roomPeakTimer  = useRef(null);
  const animFrame      = useRef(null);
  const mediaStream    = useRef(null);
  const audioCtx       = useRef(null);
  const analyser       = useRef(null);
  const roomAnalyser   = useRef(null);
  const roomBuffer     = useRef(null);
  const pitchBuffer    = useRef(new Float32Array(2048));
  const autoTimer      = useRef(null);
  const spotifyPollTimer = useRef(null);
  const spotifyTrackIdRef = useRef(null); // last Spotify track id seen — avoids re-enriching on every poll
  const reportTimer    = useRef(null);
  const countdownTimer = useRef(null);
  const identifying    = useRef(false);
  const cleanStreamRef = useRef(null); // clean stream for pitch detection
  const smoothRef      = useRef(null);
  const pitchHistory   = useRef([]);
  const trackInfoRef   = useRef(null); // ref mirror for use inside intervals
  const lastTrackKeyRef = useRef(null); // ref mirror — intervals must read this, not the lastTrackKey state directly
  const spotifyStatusRef = useRef(null); // ref mirror — same reason
  // Silent-stream watchdog — catches the case where getUserMedia() succeeds and
  // hands back a MediaStream, but another app (Facebook/Messenger holding the mic,
  // an active call, etc.) means it's producing pure silence. That's not an error
  // the browser reports — no exception is thrown — so without this, the person
  // just sees "awaiting signal" forever with no explanation.
  const armedAtRef = useRef(0);
  const everHeardSignalRef = useRef(false);
  const silentWarnedRef = useRef(false);

  // Keep refs in sync
  useEffect(() => { trackInfoRef.current = trackInfo; }, [trackInfo]);
  useEffect(() => { lastTrackKeyRef.current = lastTrackKey; }, [lastTrackKey]);
  useEffect(() => { spotifyStatusRef.current = spotifyStatus; }, [spotifyStatus]);

  // ── ANALYTICS PING — fires once on load ──────────────────────────────────
  useEffect(() => {
    try {
      fetch(`${PROXY_BASE_URL}/ping`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          v:"1.6", ts:Date.now(),
          tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
        }),
      }).catch(()=>{});
    } catch {}
  }, []);

  // ── ACTIVE USER COUNTER ───────────────────────────────────────────────────
  const sendPing = useCallback(async () => {
    try {
      await fetch(`${PROXY_BASE_URL}/ping`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          sessionId: sessionId.current,
          tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
          v: "1.5",
        }),
      });
    } catch {}
  }, []);

  const fetchActive = useCallback(async () => {
    try {
      const res  = await fetch(`${PROXY_BASE_URL}/active`);
      const data = await res.json();
      // Add 1 to include this user, minimum 1
      setActiveUsers(Math.max(1, (data.count || 0) + 1));
    } catch {}
  }, []);

  // Fetch active count on mount
  useEffect(() => {
    fetchActive();
    const t = setInterval(fetchActive, 5 * 60 * 1000); // refresh every 5min
    return () => clearInterval(t);
  }, [fetchActive]);

  // Ping while armed — every 5 minutes
  useEffect(() => {
    if (armed) {
      sendPing(); // immediate ping on arm
      pingTimer.current = setInterval(sendPing, 5 * 60 * 1000);
    } else {
      clearInterval(pingTimer.current);
    }
    return () => clearInterval(pingTimer.current);
  }, [armed, sendPing]);

  // ── PITCH SMOOTHING ──────────────────────────────────────────────────────
  const addPitchSample = useCallback((cents) => {
    const now = Date.now();
    pitchHistory.current.push({ time:now, cents });
    pitchHistory.current = pitchHistory.current.filter(p => now-p.time < PITCH_SMOOTH_MS);
    const vals = [...pitchHistory.current.map(p=>p.cents)].sort((a,b)=>a-b);
    const med  = vals[Math.floor(vals.length/2)];
    smoothRef.current = med;
    setSmoothCents(med);
  }, []);

  // ── COMMIT CURRENT SONG TO SESSION LOG ──────────────────────────────────
  const commitSongToLog = useCallback((info, samples) => {
    if (!info || samples.length < 5) return;
    const accuracy = calcAccuracy(samples);
    setSessionLog(prev => {
      // Update existing entry or add new one
      const idx = prev.findIndex(s => s.title === info.title && s.artist === info.artist);
      if (idx >= 0) {
        const updated = [...prev];
        // Merge samples for running accuracy
        updated[idx] = { ...updated[idx], accuracy, samples:[...updated[idx].samples, ...samples] };
        updated[idx].accuracy = calcAccuracy(updated[idx].samples);
        return updated;
      }
      return [...prev, { title:info.title, artist:info.artist, accuracy, samples }];
    });
  }, []);

  // ── CORE RECOGNITION ────────────────────────────────────────────────────
  const recognizeTrack = useCallback(async () => {
    if (!mediaStream.current || identifying.current) return;
    identifying.current = true;

    // Phase 1 — capturing (6 seconds, no countdown)
    setIdPhase("capturing");
    setCountdown(null);

    try {
      const chunks = [];
      const MIME_CANDIDATES = [
        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/mp4;codecs=mp4a.40.2",   // iOS Safari — AAC in MP4 container
        "audio/mp4",                     // iOS Safari fallback
        "audio/ogg;codecs=opus",
        "audio/ogg",
      ];
      const mimeType = MIME_CANDIDATES.find(t => MediaRecorder.isTypeSupported(t)) || "";
      // If nothing on the list is supported, omit mimeType entirely and let the
      // browser pick its own default rather than passing an unverified string
      // (an unsupported type throws immediately on iOS Safari).
      const recorder = mimeType
        ? new MediaRecorder(mediaStream.current, { mimeType })
        : new MediaRecorder(mediaStream.current);
      const actualMimeType = recorder.mimeType || mimeType || "audio/mp4";
      setLastMimeType(actualMimeType);
      pushDebug("mimeType selected", actualMimeType);
      recorder.ondataavailable = (e) => { if (e.data?.size > 0) chunks.push(e.data); };

      await new Promise((resolve, reject) => {
        recorder.onerror = reject;
        recorder.onstop  = resolve;
        recorder.start(500);
        setTimeout(() => { if (recorder.state !== "inactive") recorder.stop(); }, AUDIO_SAMPLE_MS);
      });

      // Phase 2 — countdown 3, 2, 1 runs visually while we prepare and send
      setIdPhase("counting");
      let cd = 3;
      setCountdown(cd);
      clearInterval(countdownTimer.current);
      countdownTimer.current = setInterval(() => {
        cd -= 1;
        if (cd <= 0) { clearInterval(countdownTimer.current); setCountdown(null); setIdPhase("sending"); }
        else setCountdown(cd);
      }, 1000);

      if (!chunks.length) { setStatusMsg("No audio captured — check mic permissions"); setTimeout(()=>setStatusMsg(""),4000); return; }

      const blob   = new Blob(chunks, { type:actualMimeType });
      pushDebug("blob captured", `${blob.size} bytes, ${chunks.length} chunks, type=${blob.type}`);
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onloadend = () => r.result?.includes(",") ? res(r.result.split(",")[1]) : rej(new Error("FileReader failed"));
        r.onerror = rej;
        r.readAsDataURL(blob);
      });

      // Countdown and fetch run in parallel — no artificial wait
      setIdPhase("sending");

      const resp = await fetch(`${PROXY_BASE_URL}/recognize`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ audio:base64, mimeType:actualMimeType }),
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      if (data.status === "error") {
        pushDebug("AudD error", data.error?.error_message || "unknown");
        setStatusMsg(`AudD: ${data.error?.error_message || "error"}`);
        setTimeout(()=>setStatusMsg(""), 5000);
        return;
      }

      if (data.result) {
        const { title, artist } = data.result;
        const key = `${title}||${artist}`;

        if (key !== lastTrackKeyRef.current) {
          // Commit previous song before switching
          if (trackInfoRef.current) {
            setCurrentSamples(prev => {
              commitSongToLog(trackInfoRef.current, prev);
              return [];
            });
          }
          setIdPhase("enriching");
          try {
            const er = await fetch(`${PROXY_BASE_URL}/enrich`, {
              method:"POST", headers:{"Content-Type":"application/json"},
              body: JSON.stringify({ title, artist }),
            });
            const ed = await er.json();
            setTrackInfo({ title, artist, key:ed.key||"Unknown", bpm:ed.bpm||"—", genre:ed.genre||"", tip:ed.tip||"" });
            setLastTrackKey(key);
          } catch {
            setTrackInfo({ title, artist, key:"—", bpm:"—", genre:"", tip:"" });
            setLastTrackKey(key);
          }
        }
        setStatusMsg("");
      } else {
        setStatusMsg("No match — try holding closer to speaker");
        setTimeout(()=>setStatusMsg(""), 5000);
      }
    } catch (err) {
      pushDebug("recognizeTrack catch", err?.message || String(err));
      setStatusMsg(`Error: ${err.message}`);
      setTimeout(()=>setStatusMsg(""), 5000);
    } finally {
      clearInterval(countdownTimer.current);
      setCountdown(null);
      setIdPhase(null);
      identifying.current = false;
    }
  }, [commitSongToLog]);

  // ── ARM / DISARM ─────────────────────────────────────────────────────────
  const toggleArmed = async () => {
    if (armed) {
      // Commit final song before disarming
      if (trackInfoRef.current) {
        setCurrentSamples(prev => { commitSongToLog(trackInfoRef.current, prev); return []; });
      }
      setArmed(false);
      releaseWakeLock();
      clearInterval(autoTimer.current);
      clearInterval(spotifyPollTimer.current);
      clearInterval(reportTimer.current);
      clearInterval(countdownTimer.current);
      setCountdown(null); setIdPhase(null);
      cancelAnimationFrame(animFrame.current);
      if (analyser.current)      { analyser.current.disconnect(); analyser.current = null; }
      if (roomAnalyser.current)  { roomAnalyser.current.disconnect(); roomAnalyser.current = null; }
      roomBuffer.current = null;
      if (audioCtx.current)      { audioCtx.current.close(); audioCtx.current = null; }
      if (mediaStream.current)   { mediaStream.current.getTracks().forEach(t=>t.stop()); mediaStream.current = null; }
      if (cleanStreamRef.current){ cleanStreamRef.current.getTracks().forEach(t=>t.stop()); cleanStreamRef.current = null; }
      setRoomMeter(0); setVoxMeter(0); setRoomPeak(0); setVoxPeak(0);
      setPitchCents(null); setSmoothCents(null); setClipping(false); setStatusMsg("");
      identifying.current = false;
      pitchHistory.current = []; smoothRef.current = null;
    } else {
      // Create AudioContext FIRST — must be within direct user gesture.
      // On mobile, the gesture context expires after any await call.
      let audioCtxTemp;
      try {
        audioCtxTemp = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000, latencyHint: 'playback' });
        if (audioCtxTemp.state === 'suspended') await audioCtxTemp.resume();
      } catch(e) {
        setStatusMsg(`Audio engine failed: ${e.message}`);
        setTimeout(() => setStatusMsg(''), 6000);
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl:  false,
            channelCount:     1,        // mono — prevents Bluetooth stereo mode switching
            googHighpassFilter: false,  // Chrome hint: disable internal HP filter (we do our own)
          },
          video: false,
        });
        mediaStream.current    = stream;
        cleanStreamRef.current = null;

        const source   = audioCtxTemp.createMediaStreamSource(stream);

        // VOX — narrowband bandpass filter for pitch detection
        // Isolates human singing voice (200Hz–3kHz) — rejects backing track bleed
        const hpFilter = audioCtxTemp.createBiquadFilter();
        hpFilter.type            = "highpass";
        hpFilter.frequency.value = 200;   // cuts bass rumble and low music content
        hpFilter.Q.value         = 0.9;   // tighter rolloff than before

        const lpFilter = audioCtxTemp.createBiquadFilter();
        lpFilter.type            = "lowpass";
        lpFilter.frequency.value = 3000;  // cuts hi-hat, cymbals, upper music content
        lpFilter.Q.value         = 0.9;

        const anal     = audioCtxTemp.createAnalyser();
        anal.fftSize   = 2048;
        anal.smoothingTimeConstant = 0.8;
        source.connect(hpFilter);
        hpFilter.connect(lpFilter);       // chain: source → HP → LP → analyser
        lpFilter.connect(anal);

        // ROOM — unfiltered raw signal for ambient metering
        const roomAnal = audioCtxTemp.createAnalyser();
        roomAnal.fftSize = 1024;
        roomAnal.smoothingTimeConstant = 0.85;
        source.connect(roomAnal);

        // Silencer — routes mic input to destination at zero gain
        // This prevents Android from routing AudioContext output to speaker
        // Must be connected to source to be effective — floating gain node does nothing
        const silencer = audioCtxTemp.createGain();
        silencer.gain.value = 0;
        source.connect(silencer);
        silencer.connect(audioCtxTemp.destination);

        audioCtx.current     = audioCtxTemp;
        analyser.current     = anal;
        roomAnalyser.current = roomAnal;
        pitchBuffer.current  = new Float32Array(anal.fftSize);
        roomBuffer.current   = new Float32Array(roomAnal.fftSize);

        // Arm after everything is ready
        setArmed(true);
        requestWakeLock();
        armedAtRef.current = Date.now();
        everHeardSignalRef.current = false;
        silentWarnedRef.current = false;

        // If Spotify's connected, it's the authoritative track source — skip the
        // AudD mic-fingerprint loop entirely rather than running both and racing.
        if (spotifyStatusRef.current === "connected") {
          pollSpotifyNowPlaying(); // immediate — don't wait a full poll interval
          spotifyPollTimer.current = setInterval(pollSpotifyNowPlaying, SPOTIFY_POLL_INTERVAL);
        } else {
          setTimeout(() => recognizeTrack(), 300);
        }
        autoTimer.current = setInterval(() => {
          // Re-checked every tick, not just at arm-time, in case Spotify connects/
          // disconnects mid-session (e.g. token refresh fails and forces a disconnect).
          if (spotifyStatusRef.current === "connected") return;
          if (!identifying.current) recognizeTrack();
        }, RECOGNITION_INTERVAL);
        reportTimer.current = setInterval(() => {
          if (smoothRef.current !== null && trackInfoRef.current !== null) {
            const sample = { time:Date.now(), cents:smoothRef.current };
            setCurrentSamples(prev => [...prev.slice(-600), sample]);
          }
        }, REPORT_INTERVAL_MS);
      } catch (err) {
        pushDebug("getUserMedia error", `${err.name}: ${err.message}`);
        const msg = err.message.includes("timeout")
          ? "Mic timeout — close Facebook, Messenger and other apps then try again."
          : err.name === "NotAllowedError"
            ? "Microphone access denied — check Chrome permissions in Android Settings."
            : err.name === "NotFoundError"
              ? "No microphone found — check your device settings."
              : err.name === "NotReadableError"
                ? "Mic's already in use by another app — force close Facebook, Messenger and any other camera/mic apps, then try again."
                : `Mic error: ${err.name} — ${err.message}`;
        setStatusMsg(msg);
        setTimeout(() => setStatusMsg(""), 8000);
      }
    }
  };

  // ── METERING + PITCH ─────────────────────────────────────────────────────
  useEffect(() => {
    if (!armed) { cancelAnimationFrame(animFrame.current); return; }
    let localTick = 0;
    const animate = () => {
      localTick++;
      if (analyser.current) {
        analyser.current.getFloatTimeDomainData(pitchBuffer.current);
        const sampleRate = audioCtx.current?.sampleRate || 44100;
        const freq  = detectPitch(pitchBuffer.current, sampleRate);
        const cents = freq ? freqToNearestCents(freq) : null;
        setPitchCents(cents);
        if (cents !== null) addPitchSample(cents);
        else { pitchHistory.current=[]; smoothRef.current=null; setSmoothCents(null); }
        // VOX — real signal from highpass filtered analyser
        const voxBuf = pitchBuffer.current;
        const voxRms = Math.sqrt(voxBuf.reduce((s,v)=>s+v*v,0)/voxBuf.length);
        const voxDb  = 20 * Math.log10(Math.max(voxRms, 1e-6));
        const voxLvl = Math.max(0, Math.min(100, ((voxDb+60)/60)*100*(voxLevel/100)));
        setVoxMeter(voxLvl);
        if (voxLvl > voxPeak) { setVoxPeak(voxLvl); clearTimeout(voxPeakTimer.current); voxPeakTimer.current = setTimeout(()=>setVoxPeak(0),1600); }

        // ROOM — real signal from unfiltered analyser
        if (roomAnalyser.current && roomBuffer.current) {
          roomAnalyser.current.getFloatTimeDomainData(roomBuffer.current);
          const roomRms = Math.sqrt(roomBuffer.current.reduce((s,v)=>s+v*v,0)/roomBuffer.current.length);
          const roomDb  = 20 * Math.log10(Math.max(roomRms, 1e-6));
          const rNew    = Math.max(0, Math.min(100, ((roomDb+60)/60)*100*(roomLevel/100)));
          setRoomMeter(rNew);
          if (rNew > roomPeak) { setRoomPeak(rNew); clearTimeout(roomPeakTimer.current); roomPeakTimer.current = setTimeout(()=>setRoomPeak(0),1600); }
          setClipping(voxLvl > 95 || rNew > 95);

          // Watchdog: raw RMS this low isn't "quiet room," it's a dead/muted stream —
          // any real mic in any real environment picks up more noise floor than this.
          const TRUE_SILENCE_RMS = 0.0001;
          if (voxRms > TRUE_SILENCE_RMS || roomRms > TRUE_SILENCE_RMS) {
            everHeardSignalRef.current = true;
          }
          if (!everHeardSignalRef.current && !silentWarnedRef.current && armedAtRef.current && Date.now() - armedAtRef.current > 8000) {
            silentWarnedRef.current = true;
            pushDebug("silent stream watchdog", "no real signal 8s after arming — likely a dead stream, not a quiet room");
            setStatusMsg("Not picking up any sound — another app (Facebook, Messenger, a call) may be silently holding the mic. Force close other apps, then disarm and re-arm.");
            setTimeout(() => setStatusMsg(""), 10000);
          }
        }
      }
      animFrame.current = requestAnimationFrame(animate);
    };
    animFrame.current = requestAnimationFrame(animate);
    return () => { cancelAnimationFrame(animFrame.current); clearTimeout(roomPeakTimer.current); clearTimeout(voxPeakTimer.current); };
  }, [armed, roomLevel, voxLevel, addPitchSample, pushDebug]);

  useEffect(() => {
    return () => {
      clearInterval(autoTimer.current);
      clearInterval(reportTimer.current);
      clearInterval(countdownTimer.current);
      if (mediaStream.current)    mediaStream.current.getTracks().forEach(t=>t.stop());
      if (cleanStreamRef.current) cleanStreamRef.current.getTracks().forEach(t=>t.stop());
    };
  }, []);

  const TRIAL_DAYS = 7;

        localStorage.setItem("micDrop_trialStart", Date.now().toString());
        return { active:true, daysLeft:TRIAL_DAYS, expired:false };
      }
      const elapsed  = Date.now() - parseInt(start);
      const daysLeft = Math.max(0, Math.ceil((TRIAL_MS - elapsed) / (1000 * 60 * 60 * 24)));
      const expired  = elapsed >= TRIAL_MS;
      return { active:!expired, daysLeft, expired };
    } catch { return { active:true, daysLeft:TRIAL_DAYS, expired:false }; }
  };

  const [trial] = useState(() => getTrialState());

    try {
      if (localStorage.getItem("micDrop_proExpiry")) return; // already migrated
      const start = localStorage.getItem("micDrop_trialStart");
      if (!start) return;
      const trialEnd = parseInt(start) + TRIAL_MS;
      // If trial end is more than 8 days in the future, user has paid Pro time
      const buffer = 8 * 24 * 60 * 60 * 1000;
      if (trialEnd > Date.now() + buffer) {
        localStorage.setItem("micDrop_proExpiry", trialEnd.toString());
      }
    } catch {}

  migrateLegacyPro();

          <span style={{ color:"#333", fontSize:"20px" }}>·</span>
          <button
            onClick={() => setShowSplash(true)}
            style={{ fontSize:"20px", color:"#C9A84C", fontFamily:"'Courier New',monospace", letterSpacing:"0.1em", background:"none", border:"none", borderBottom:"1px solid #554020", cursor:"pointer", padding:0, opacity:0.7 }}
          >
            ⭐ Pro
          </button>
        </div>

        {/* Second nav row — Dressing Room + Invite */}
        <div style={{ display:"flex", alignItems:"center", gap:"16px", justifyContent:"center", marginTop:"8px" }}>
          <button
            onClick={() => setShowDressingRoom(true)}
            style={{ fontSize:"20px", color:"#666", fontFamily:"'Courier New',monospace", letterSpacing:"0.1em", background:"none", border:"none", borderBottom:"1px solid #333", cursor:"pointer", padding:0 }}
          >
            🎭 Backstage
          </button>
          <span style={{ color:"#333", fontSize:"20px" }}>·</span>
          <button
            onClick={() => {
              const from = encodeURIComponent((profile.name || "").trim() || "a friend");
              window.open(`invite.html?from=${from}`, "_blank");
            }}
            style={{ fontSize:"20px", color:"#C9A84C", fontFamily:"'Courier New',monospace", letterSpacing:"0.1em", background:"none", border:"none", borderBottom:"1px solid #554020", cursor:"pointer", padding:0, opacity:0.85 }}
          >
            🎤 Invite
          </button>
        </div>

        {/* Third nav row — Voice ID */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", marginTop:"8px" }}>
          <button
            onClick={() => isPro ? setShowVoiceId(true) : setShowSplash(true)}
            style={{ fontSize:"20px", color: isPro ? "#C9A84C" : "#666", fontFamily:"'Courier New',monospace", letterSpacing:"0.1em", background:"none", border:"none", borderBottom: isPro ? "1px solid #554020" : "1px solid #333", cursor:"pointer", padding:0, opacity: isPro ? 0.85 : 1 }}
          >
            🎙️ Voice ID{!isPro ? " (Pro)" : ""}
          </button>
        </div>

        {/* Version — tap 5x quickly to toggle tester debug overlay */}
        <div
          onClick={handleVersionTap}
          style={{ fontSize:"15px", color:"#2a2a2a", letterSpacing:"0.2em", textTransform:"uppercase", cursor:"pointer", userSelect:"none" }}
        >
          Mic Drop v2.1 — Powered by AudD + Claude
        </div>

      </div>

      {/* ── TESTER DEBUG OVERLAY ── */}
      {showDebug && (
        <div style={{
          position:"fixed", inset:0, zIndex:9999, background:"rgba(0,0,0,0.94)",
          display:"flex", flexDirection:"column", padding:"16px",
        }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
            <div style={{ color:"#C9A84C", fontFamily:"'Courier New',monospace", fontSize:"16px", letterSpacing:"0.05em" }}>
              🐛 DEBUG — Mic Drop
            </div>
            <button onClick={() => setShowDebug(false)} style={{ background:"none", border:"1px solid #444", color:"#aaa", borderRadius:"6px", padding:"4px 10px", fontSize:"14px" }}>
              Close
            </button>
          </div>
          <div style={{ color:"#888", fontSize:"12px", fontFamily:"'Courier New',monospace", marginBottom:"10px", lineHeight:"1.6" }}>
            <div>UA: {navigator.userAgent}</div>
            <div>Last mimeType: {lastMimeType || "n/a"}</div>
            <div>Armed: {String(armed)} · Identifying: {String(identifying.current)}</div>
          </div>
          <div style={{ flex:1, overflowY:"auto", border:"1px solid #222", borderRadius:"8px", padding:"8px" }}>
            {debugLog.length === 0 && (
              <div style={{ color:"#555", fontSize:"13px", fontFamily:"'Courier New',monospace" }}>
                No events logged yet — arm the mic and try Identify Track.
              </div>
            )}
            {debugLog.map((d, i) => (
              <div key={i} style={{ marginBottom:"8px", paddingBottom:"8px", borderBottom:"1px solid #1a1a1a" }}>
                <div style={{ color:"#666", fontSize:"11px", fontFamily:"'Courier New',monospace" }}>{d.t}</div>
                <div style={{ color:"#C9A84C", fontSize:"13px", fontFamily:"'Courier New',monospace" }}>{d.label}</div>
                <div style={{ color:"#ccc", fontSize:"12px", fontFamily:"'Courier New',monospace", wordBreak:"break-word" }}>{d.detail}</div>
              </div>
            ))}
          </div>
          <button
            onClick={shareDebugLog}
            style={{ marginTop:"10px", background:"#C9A84C", color:"#000", border:"none", borderRadius:"8px", padding:"12px", fontSize:"15px", fontWeight:"bold", fontFamily:"'Courier New',monospace" }}
          >
            📤 Share / Copy Log
          </button>
        </div>
      )}

    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><MicDrop /></ErrorBoundary>);
</script>
</body>
</html>
