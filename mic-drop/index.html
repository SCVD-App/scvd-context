  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #0a0a0a; min-height: 100vh; overflow-x: hidden; }
    body { display: flex; justify-content: center; }
    #root { width: 100%; max-width: 420px; }

    @keyframes pulse       { from { opacity:1; } to { opacity:0.3; } }
    @keyframes scroll-left { 0% { transform:translateX(100vw); } 100% { transform:translateX(-100%); } }
    @keyframes fadeIn      { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin        { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
    @keyframes glowPulse   { from { opacity:0.7; } to { opacity:1; } }
    @keyframes msgPop      { 0% { opacity:0; transform:translateY(8px) scale(0.95); } 15% { opacity:1; transform:translateY(0) scale(1); } 80% { opacity:1; } 100% { opacity:0; transform:translateY(-6px); } }
    @keyframes countPop    { 0% { transform:scale(1.4); opacity:0; } 100% { transform:scale(1); opacity:1; } }
    @keyframes vipGlowIn   { 0% { opacity:0; } 100% { opacity:1; } }
    @keyframes vipGlowOut  { 0% { opacity:1; } 100% { opacity:0; } }
    @keyframes vipTextPop  { 0% { opacity:0; transform:scale(0.85); } 100% { opacity:1; transform:scale(1); } }

    .live-pulse { animation:pulse 1s infinite alternate; }
    .clip-pulse { animation:pulse 0.3s infinite alternate; }
    .spin       { animation:spin 1s linear infinite; }
    .glow-pulse { animation:glowPulse 1.8s ease-in-out infinite alternate; }
    .count-pop  { animation:countPop 0.3s ease-out forwards; }

    .banner-track { display:inline-block; white-space:nowrap; animation:scroll-left 22s linear infinite; }

    .glow-top, .glow-bottom { transition:opacity 0.8s ease-out, background 0.25s ease; }
    .glow-top    { position:fixed; top:0; left:0; right:0; height:40vh; pointer-events:none; z-index:999; }
    .glow-bottom { position:fixed; bottom:0; left:0; right:0; height:40vh; pointer-events:none; z-index:999; }

    .fader-cap {
      position:absolute; left:50%; width:48px; height:24px;
      transform:translate(-50%,-50%);
      background:linear-gradient(180deg,#e8e8e8 0%,#b8b8b8 40%,#888 100%);
      border-radius:5px; cursor:grab; touch-action:none;
    }
    .fader-cap:active { cursor:grabbing; }

    .arm-btn {
      width:100%; padding:18px; border-radius:14px;
      font-family:'Courier New',monospace; font-size:16px; font-weight:bold;
      letter-spacing:0.3em; text-transform:uppercase; cursor:pointer;
      transition:all 0.25s; border:2px solid #333;
      background:linear-gradient(180deg,#1a1a1a 0%,#111 100%); color:#555;
    }
    .arm-btn.armed {
      border-color:#ff2200; background:linear-gradient(180deg,#3a0000 0%,#1a0000 100%);
      color:#ff4422; box-shadow:0 0 24px rgba(255,34,0,0.35);
    }
    .identify-btn {
      width:100%; padding:14px; border-radius:14px;
      font-family:'Courier New',monospace; font-size:14px; font-weight:bold;
      letter-spacing:0.2em; text-transform:uppercase; cursor:pointer;
      transition:all 0.25s; border:2px solid rgba(201,168,76,0.4);
      background:rgba(201,168,76,0.08); color:#C9A84C;
    }
    .identify-btn:active { background:rgba(201,168,76,0.18); transform:scale(0.98); }
    .identify-btn:disabled { opacity:0.4; cursor:not-allowed; }

    .report-btn {
      width:100%; padding:14px; border-radius:14px;
      font-family:'Courier New',monospace; font-size:14px; font-weight:bold;
      letter-spacing:0.2em; text-transform:uppercase; cursor:pointer;
      transition:all 0.25s; border:2px solid rgba(46,109,164,0.5);
      background:rgba(46,109,164,0.1); color:#2E6DA4;
    }
    .report-btn:active { background:rgba(46,109,164,0.2); transform:scale(0.98); }

    .track-card  { animation:fadeIn 0.4s ease; }
    .report-card { animation:fadeIn 0.5s ease; }

    .pro-blur {
      filter:blur(4px);
      pointer-events:none;
      user-select:none;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const PROXY_BASE_URL       = "https://micdrop.emblen-scott.workers.dev";
const RECOGNITION_INTERVAL = 45000;
const AUDIO_SAMPLE_MS      = 7000;   // 7s recording window
const NUM_LEDS             = 20;
const PITCH_SMOOTH_MS      = 300;
const POCKET_CENTS         = 25;     // tightened — earned, not gifted
const CLOSE_CENTS          = 55;
const REPORT_INTERVAL_MS   = 500;
const MIN_VOX_RMS          = 0.06;   // narrowband gate — rejects backing track bleed, requires close vocal signal
const MAX_VOX_FREQ         = 3000;   // human singing voice tops out ~3kHz

// ── SPOTIFY INTEGRATION (Beta) ────────────────────────────────────────────────
// Placeholder Client ID — swap for the real one from developer.spotify.com/dashboard.
// Safe to keep public in source (same as Spotify's own web player does).
const SPOTIFY_CLIENT_ID    = "5cba2d3336ad4d08b63970ad40fc7814";
const SPOTIFY_REDIRECT_URI = "https://scvd-app.github.io/Mic-Drop/";
const SPOTIFY_SCOPES       = "user-read-currently-playing user-read-playback-state user-modify-playback-state";
const SPOTIFY_AUTH_URL     = "https://accounts.spotify.com/authorize";
// Deliberately capped low right now — Spotify's Developer Mode only allows 5 test
// users before requiring Extended Quota Mode (needs registered business + 250k MAU).
// This flag lets us kill the feature globally in one place if the auth slot fills up.
const SPOTIFY_BETA_ENABLED = true;
// Metadata-only call, much cheaper than an AudD audio fingerprint — safe to poll often
const SPOTIFY_POLL_INTERVAL = 5000;

// ── PITCH DETECTION (autocorrelation) ────────────────────────────────────────
function detectPitch(buffer, sampleRate) {
  const SIZE = buffer.length;
  const rms  = Math.sqrt(buffer.reduce((s,v) => s+v*v, 0) / SIZE);
  if (rms < MIN_VOX_RMS) return null;
  const corr = new Float32Array(SIZE);
  for (let lag = 0; lag < SIZE; lag++) {
    let sum = 0;
    for (let i = 0; i < SIZE - lag; i++) sum += buffer[i] * buffer[i+lag];
    corr[lag] = sum;
  }
  let d = 0;
  while (d < SIZE/2 && corr[d] > corr[d+1]) d++;
  let maxVal = -Infinity, maxLag = -1;
  for (let i = d; i < SIZE/2; i++) {
    if (corr[i] > maxVal) { maxVal = corr[i]; maxLag = i; }
  }
  if (maxLag === -1 || maxVal < corr[0] * 0.5) return null;
  const y0 = corr[maxLag-1] || 0, y1 = corr[maxLag], y2 = corr[maxLag+1] || 0;
  const refined = maxLag + (y2-y0) / (2*(2*y1-y0-y2) + 1e-10);
  const freq = sampleRate / refined;
  if (freq < 60 || freq > 1200) return null;
  return freq;
}

function freqToNearestCents(freq) {
  if (!freq) return null;
  const midiFloat   = 12 * Math.log2(freq / 440) + 69;
  const midiNearest = Math.round(midiFloat);
  return Math.round((midiFloat - midiNearest) * 100);
}

// ── SCORING ──────────────────────────────────────────────────────────────────
function calcAccuracy(samples) {
  if (!samples || samples.length === 0) return 0;
  const pocket = samples.filter(d => Math.abs(d.cents) <= POCKET_CENTS).length;
  return Math.round((pocket / samples.length) * 100);
}

function gradeFromAccuracy(pct) {
  if (pct >= 95) return { label:"👑 DIVA",        color:"#C9A84C", tier:"gold"   };
  if (pct >= 90) return { label:"💫 LEGENDARY",   color:"#C9A84C", tier:"gold"   };
  if (pct >= 85) return { label:"🌟 HEADLINER",   color:"#00cc55", tier:"green"  };
  if (pct >= 66) return { label:"⭐ RISING STAR", color:"#ffaa00", tier:"yellow" };
  if (pct >= 31) return { label:"🎤 OPEN MIC",    color:"#888",    tier:"red"    };
  return               { label:"🔪 CORONER",      color:"#ff2200", tier:"red"    };
}

function scoreColor(pct) {
  if (pct >= 95) return "#C9A84C";
  if (pct >= 90) return "#00cc55";
  if (pct >= 85) return "#ffaa00";
  return "#ff2200";
}

// ── LED METER ─────────────────────────────────────────────────────────────────
function LEDMeter({ level, peakHold, label, icon }) {
  const active = Math.round((level/100)*NUM_LEDS);
  const peak   = Math.round((peakHold/100)*NUM_LEDS) - 1;
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:"6px", width:"100%" }}>
      <div style={{ fontSize:"14px", letterSpacing:"0.18em", color:"#666", fontFamily:"'Courier New',monospace", textTransform:"uppercase" }}>{icon} {label}</div>
      <div style={{ display:"flex", flexDirection:"column-reverse", gap:"3px", height:"220px" }}>
        {Array.from({ length:NUM_LEDS }).map((_,i) => {
          const on   = i < active;
          const isPk = i === peak && peakHold > 0;
          const col  = i >= NUM_LEDS-2 ? "#ff2200" : i >= NUM_LEDS-6 ? "#ffaa00" : "#00ff66";
          return (
            <div key={i} style={{
              width:"30px", height:"8px", borderRadius:"2px",
              backgroundColor: on||isPk ? col : "rgba(255,255,255,0.05)",
              boxShadow: on||isPk ? `0 0 7px ${col}99` : "none",
              transition:"background-color 0.04s",
            }}/>
          );
        })}
      </div>
    </div>
  );
}

// ── FADER ─────────────────────────────────────────────────────────────────────
function Fader({ value, onChange, label, color }) {
  const trackRef = useRef(null);
  const drag     = useRef(false);
  const calc = (y) => {
    const r = trackRef.current.getBoundingClientRect();
    return Math.round((1 - Math.max(0, Math.min(1, (y-r.top)/r.height))) * 100);
  };
  useEffect(() => {
    const onMM = (e) => { if (drag.current) onChange(calc(e.clientY)); };
    const onMU = ()  => { drag.current = false; };
    const onTM = (e) => { if (drag.current) { e.preventDefault(); onChange(calc(e.touches[0].clientY)); }};
    const onTE = ()  => { drag.current = false; };
    window.addEventListener("mousemove", onMM);
    window.addEventListener("mouseup",   onMU);
    window.addEventListener("touchmove", onTM, { passive:false });
    window.addEventListener("touchend",  onTE);
    return () => {
      window.removeEventListener("mousemove", onMM);
      window.removeEventListener("mouseup",   onMU);
      window.removeEventListener("touchmove", onTM);
      window.removeEventListener("touchend",  onTE);
    };
  }, []);
  const thumbTop = (1 - value/100) * 200;
  const dbLabel  = value === 0 ? "-∞" : value === 100 ? "0 dB" : `${Math.round(-24+(value/100)*24)} dB`;
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:"10px", userSelect:"none" }}>
      <div style={{ fontSize:"14px", letterSpacing:"0.18em", color:"#666", fontFamily:"'Courier New',monospace", textTransform:"uppercase" }}>{label}</div>
      <div ref={trackRef}
        onMouseDown={(e) => { drag.current=true; onChange(calc(e.clientY)); }}
        onTouchStart={(e) => { drag.current=true; onChange(calc(e.touches[0].clientY)); }}
        style={{ position:"relative", width:"30px", height:"220px", cursor:"pointer" }}
      >
        <div style={{ position:"absolute", left:"50%", transform:"translateX(-50%)", top:0, width:"4px", height:"100%", background:"linear-gradient(to bottom,#2a2a2a,#111)", borderRadius:"2px", boxShadow:"inset 0 1px 4px rgba(0,0,0,0.9)" }}/>
        {[100,75,50,25,0].map(pct => (
          <div key={pct} style={{ position:"absolute", right:"-20px", top:`${(1-pct/100)*100}%`, transform:"translateY(-50%)", fontSize:"17px", color:"#333", fontFamily:"'Courier New',monospace" }}>
            {pct===100?"∞":pct===75?"-6":pct===50?"-12":pct===25?"-24":"-∞"}
          </div>
        ))}
        <div className="fader-cap"
          style={{ top:`${thumbTop}px`, boxShadow:`0 2px 10px rgba(0,0,0,0.9), 0 0 14px ${color}55`, border:`1px solid ${color}77` }}
          onMouseDown={(e) => { e.stopPropagation(); drag.current=true; onChange(calc(e.clientY)); }}
          onTouchStart={(e) => { e.stopPropagation(); drag.current=true; onChange(calc(e.touches[0].clientY)); }}
        >
          {[-3,0,3].map(o=>(
            <div key={o} style={{ position:"absolute", top:`calc(50% + ${o}px)`, left:"18%", right:"18%", height:"1px", background:"rgba(0,0,0,0.35)" }}/>
          ))}
        </div>
      </div>
      <div style={{ fontSize:"15px", color, fontFamily:"'Courier New',monospace", fontWeight:"bold" }}>{dbLabel}</div>
    </div>
  );
}

// ── PITCH INDICATOR ───────────────────────────────────────────────────────────
function PitchIndicator({ cents }) {
  const info = (() => {
    if (cents === null) return { bg:"rgba(0,0,0,0)", label:"—", sub:"awaiting signal", accent:"#333" };
    const a = Math.abs(cents);
    if (a <= POCKET_CENTS) return { bg:"rgba(201,168,76,0.12)", label:"IN THE POCKET", sub:`${cents>0?"+":""}${cents}¢`, accent:"#C9A84C" };
    if (a <= CLOSE_CENTS)  return { bg:"rgba(255,170,0,0.10)",  label:"CLOSE",         sub:`${cents>0?"+":""}${cents}¢`, accent:"#ffaa00" };
    return                        { bg:"rgba(255,34,0,0.10)",   label:"OFF PITCH",     sub:`${cents>0?"+":""}${cents}¢`, accent:"#ff2200" };
  })();
  return (
    <div style={{ width:"100%", borderRadius:"12px", background:info.bg, border:`1px solid ${info.accent}33`, padding:"14px 12px", textAlign:"center", transition:"background 0.35s, border 0.35s", position:"relative", overflow:"hidden" }}>
      {cents !== null && <div style={{ position:"absolute", bottom:0, left:"50%", transform:`translateX(calc(-50% + ${Math.max(-80,Math.min(80,cents*1.1))}px))`, width:"3px", height:"100%", background:info.accent, opacity:0.55, borderRadius:"2px", transition:"transform 0.12s, background 0.35s", boxShadow:`0 0 10px ${info.accent}` }}/>}
      <div style={{ position:"absolute", bottom:0, left:"50%", width:"1px", height:"100%", background:"#282828" }}/>
      <div style={{ fontSize:"20px", letterSpacing:"0.18em", color:info.accent, fontFamily:"'Courier New',monospace", marginBottom:"3px", position:"relative", fontWeight:"bold" }}>{info.label}</div>
      <div style={{ fontSize:"28px", fontWeight:"bold", color:info.accent, fontFamily:"'Courier New',monospace", position:"relative" }}>{info.sub}</div>
    </div>
  );
}

// ── MESSAGES ─────────────────────────────────────────────────────────────────
const MESSAGES = {
  pocket: ["Hell yeah! 🔥","Whooooo! 🎉","LOCK IT IN!","That's the one!","NAILED IT!","Stay there!","Perfection 👑","You got it!","YES! YES! YES!","Sounding GOOD!"],
  sharp:  ["Soften up a bit","Ease back","Too hot — cool it","Come down a touch","Dial it back","Gentle now","Float it down","Less ceiling, more floor"],
  flat:   ["Push it higher","Lift that note","Find the ceiling","Reach for it","More air, push up","Dig deeper","Bring it up!","Unlock your chest"],
};

// ── SCREEN GLOW ───────────────────────────────────────────────────────────────
function ScreenGlow({ cents }) {
  const zoneRef      = useRef(null);
  const zoneCandRef  = useRef(null);
  const zoneTimerRef = useRef(null);
  const [zone, setZone] = useState(null);
  const opacityRef   = useRef(0);
  const [opacity, setOpacity] = useState(0);
  const decayTimer   = useRef(null);
  const [msg, setMsg]     = useState(null);
  const msgKey            = useRef(0);
  const lastMsgText       = useRef(null);
  const msgTimer          = useRef(null);

  const fireMessage = useCallback((z) => {
    const pool     = MESSAGES[z];
    const filtered = pool.filter(m => m !== lastMsgText.current);
    const text     = filtered[Math.floor(Math.random() * filtered.length)];
    lastMsgText.current = text;
    msgKey.current += 1;
    setMsg({ text, key:msgKey.current, zone:z });
    clearTimeout(msgTimer.current);
    msgTimer.current = setTimeout(() => setMsg(null), z === "pocket" ? 4000 : 3000);
  }, []);

  useEffect(() => {
    const candidate = cents === null ? null
      : Math.abs(cents) <= POCKET_CENTS ? "pocket"
      : cents > POCKET_CENTS ? "sharp" : "flat";

    if (candidate !== zoneCandRef.current) {
      zoneCandRef.current = candidate;
      clearTimeout(zoneTimerRef.current);
      zoneTimerRef.current = setTimeout(() => {
        if (zoneCandRef.current !== zoneRef.current) {
          zoneRef.current = zoneCandRef.current;
          setZone(zoneCandRef.current);
          if (zoneCandRef.current) fireMessage(zoneCandRef.current);
        }
      }, 200);
    }

    if (cents !== null) {
      clearTimeout(decayTimer.current);
      const a         = Math.abs(cents);
      const intensity = Math.min(1, Math.max(0.4, (a - POCKET_CENTS) / (100 - POCKET_CENTS)));
      const target    = zone === "pocket" ? 0.9 : 0.18 + intensity * 0.55;
      opacityRef.current = target;
      setOpacity(target);
    } else {
      clearTimeout(decayTimer.current);
      decayTimer.current = setTimeout(() => { opacityRef.current = 0; setOpacity(0); }, 800);
    }
    return () => { clearTimeout(zoneTimerRef.current); clearTimeout(decayTimer.current); };
  }, [cents, zone, fireMessage]);

  const intensity = cents !== null
    ? Math.min(1, Math.max(0, (Math.abs(cents) - POCKET_CENTS) / (100 - POCKET_CENTS))) : 0;

  return (
    <>
      <div className={`glow-top${zone==="pocket"?" glow-pulse":""}`} style={{
        background: zone==="pocket"
          ? "linear-gradient(to bottom, rgba(201,168,76,0.30) 0%, transparent 100%)"
          : zone==="sharp"
            ? `linear-gradient(to bottom, rgba(255,34,0,${0.2+intensity*0.55}) 0%, transparent 100%)`
            : "transparent",
        opacity: zone==="pocket" ? opacity : zone==="sharp" ? opacity : 0,
      }}/>
      <div className={`glow-bottom${zone==="pocket"?" glow-pulse":""}`} style={{
        background: zone==="pocket"
          ? "linear-gradient(to top, rgba(201,168,76,0.30) 0%, transparent 100%)"
          : zone==="flat"
            ? `linear-gradient(to top, rgba(255,34,0,${0.2+intensity*0.55}) 0%, transparent 100%)`
            : "transparent",
        opacity: zone==="pocket" ? opacity : zone==="flat" ? opacity : 0,
      }}/>
      {msg && (
        <div key={msg.key} style={{
          position:"fixed",
          top:    msg.zone==="sharp"  ? "8vh"  : msg.zone==="pocket" ? "50%" : "auto",
          bottom: msg.zone==="flat"   ? "8vh"  : "auto",
          transform: msg.zone==="pocket" ? "translateY(-50%)" : "none",
          left:0, right:0, textAlign:"center",
          pointerEvents:"none", zIndex:1000,
          animation:`msgPop ${msg.zone==="pocket"?4:3}s ease forwards`,
          padding:"0 20px",
        }}>
          <div style={{
            display:"inline-block",
            fontSize:    msg.zone==="pocket" ? "36px" : "24px",
            fontWeight:  "900",
            fontFamily:  "Georgia, serif",
            letterSpacing: msg.zone==="pocket" ? "0.08em" : "0.05em",
            color:       msg.zone==="pocket" ? "#C9A84C" : "#ffffff",
            textShadow:  msg.zone==="pocket"
              ? "0 0 30px rgba(201,168,76,0.9), 0 0 60px rgba(201,168,76,0.5), 0 2px 4px rgba(0,0,0,0.9)"
              : "0 0 20px rgba(255,34,0,0.8), 0 0 40px rgba(255,34,0,0.4), 0 2px 4px rgba(0,0,0,0.9)",
            textTransform: msg.zone==="pocket" ? "uppercase" : "none",
          }}>
            {msg.text}
          </div>
        </div>
      )}
    </>
  );
}

// ── COUNTDOWN DISPLAY ────────────────────────────────────────────────────────
function CountdownDisplay({ phase, countdown }) {
  // phase: "capturing" | "counting" | "sending" | "enriching"
  const phaseLabel = {
    capturing: "CAPTURING AUDIO SAMPLE",
    counting:  "IDENTIFYING SONG",
    sending:   "IDENTIFYING SONG",
    enriching: "GETTING MUSICAL DETAILS",
  }[phase] || "IDENTIFYING SONG";

  return (
    <div style={{ borderRadius:"12px", background:"rgba(201,168,76,0.06)", border:"1px solid rgba(201,168,76,0.15)", padding:"18px 12px", textAlign:"center" }}>
      <div style={{ fontSize:"17px", letterSpacing:"0.15em", color:"#777", fontFamily:"'Courier New',monospace", marginBottom:"10px" }}>
        {phaseLabel}
      </div>
      {phase === "counting" && countdown !== null ? (
        <>
          <div style={{ fontSize:"14px", letterSpacing:"0.18em", color:"#444", fontFamily:"'Courier New',monospace", marginBottom:"14px" }}>
            Pitch monitoring starts in
          </div>
          <div key={countdown} className="count-pop" style={{ fontSize:"64px", fontWeight:"900", color:"#C9A84C", fontFamily:"Georgia,serif", lineHeight:1, textShadow:"0 0 30px rgba(201,168,76,0.4)" }}>
            {countdown}
          </div>
          <div style={{ marginTop:"10px", fontSize:"18px", color:"#2a2a2a", fontFamily:"'Courier New',monospace", letterSpacing:"0.15em" }}>
            HOLD PHONE NEAR SPEAKER
          </div>
        </>
      ) : (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:"10px", padding:"10px 0" }}>
          <span className="spin" style={{ display:"inline-block", fontSize:"18px", color:"#C9A84C" }}>◈</span>
          <span style={{ fontSize:"17px", color:"#444", fontFamily:"'Courier New',monospace", letterSpacing:"0.12em" }}>
            {phase === "capturing" ? "Hold phone near speaker..." : "One moment..."}
          </span>
        </div>
      )}
    </div>
  );
}

function MusicQuiz({ answers, onChange }) {
  const [page, setPage] = useState(0);
  const perPage = 3;
  const total   = QUIZ_QUESTIONS.length;
  const pages   = Math.ceil(total / perPage);
  const visible = QUIZ_QUESTIONS.slice(page * perPage, page * perPage + perPage);
  const answered = Object.keys(answers).length;

  return (
    <div style={{ marginBottom:"24px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
        <div style={{ fontSize:"14px", letterSpacing:"0.2em", color:"#C9A84C", fontFamily:"'Courier New',monospace" }}>
          🎵 MUSIC PERSONALITY
        </div>
        <div style={{ fontSize:"12px", color:"#444", fontFamily:"'Courier New',monospace" }}>
          {answered}/{total} answered
        </div>
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
        {visible.map(q => (
          <div key={q.id} style={{ background:"rgba(255,255,255,0.02)", border:"1px solid #1e1e1e", borderRadius:"12px", padding:"12px 14px" }}>
            <div style={{ fontSize:"13px", color:"#555", fontFamily:"'Courier New',monospace", letterSpacing:"0.1em", marginBottom:"8px" }}>
              {q.label}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"6px" }}>
              {[{val:"a", label:q.a}, {val:"b", label:q.b}].map(opt => (
                <div key={opt.val}
                  onClick={() => onChange(q.id, opt.val)}
                  style={{
                    padding:"10px 8px", borderRadius:"8px", cursor:"pointer", textAlign:"center",
                    border:`2px solid ${answers[q.id]===opt.val?"#C9A84C":"#1e1e1e"}`,
                    background: answers[q.id]===opt.val?"rgba(201,168,76,0.12)":"rgba(255,255,255,0.02)",
                    transition:"all 0.15s",
                  }}
                >
                  <div style={{ fontSize:"14px", color: answers[q.id]===opt.val?"#C9A84C":"#666", fontFamily:"'Courier New',monospace", lineHeight:1.4 }}>
                    {opt.label}
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* Pagination */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:"10px" }}>
        <button
          onClick={() => setPage(p => Math.max(0, p-1))}
          disabled={page === 0}
          style={{ padding:"8px 16px", borderRadius:"8px", border:"1px solid #2a2a2a", background:"none", color: page===0?"#222":"#555", fontFamily:"'Courier New',monospace", fontSize:"13px", cursor:page===0?"default":"pointer" }}
        >◁ PREV</button>
        <div style={{ fontSize:"12px", color:"#333", fontFamily:"'Courier New',monospace" }}>
          {page+1} / {pages}
        </div>
        <button
          onClick={() => setPage(p => Math.min(pages-1, p+1))}
          disabled={page === pages-1}
          style={{ padding:"8px 16px", borderRadius:"8px", border:"1px solid #2a2a2a", background:"none", color: page===pages-1?"#222":"#555", fontFamily:"'Courier New',monospace", fontSize:"13px", cursor:page===pages-1?"default":"pointer" }}
        >NEXT ▷</button>
      </div>
    </div>
  );
}

// ── PROFILE SETUP ─────────────────────────────────────────────────────────────
function ProfileSetup({ profile, onSave, onClose }) {
  const [name,      setName]      = useState(profile.name      || "");
  const [photo,     setPhoto]     = useState(profile.photo     || null);
  const [cardStyle, setCardStyle] = useState(profile.cardStyle || "circle");
  const [preset,    setPreset]    = useState(profile.preset    || "gold");
  const [quizAnswers, setQuizAnswers] = useState(profile.quizAnswers || {});

  const handlePhoto = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onloadend = () => setPhoto(reader.result);
    reader.readAsDataURL(file);
  };

  const handleQuizAnswer = (qid, val) => {
    setQuizAnswers(prev => ({ ...prev, [qid]: val }));
  };

  const handleSave = () => {
    try {
      localStorage.setItem("micDrop_profile", JSON.stringify({ name, photo, cardStyle, preset, quizAnswers }));
    } catch {}
    onSave({ name, photo, cardStyle, preset, quizAnswers });
    onClose();
  };

  const selectedPreset = TEXT_PRESETS.find(p => p.id === preset) || TEXT_PRESETS[0];

  return (
    <div style={{ position:"fixed", inset:0, zIndex:3000, background:"rgba(0,0,0,0.97)", display:"flex", flexDirection:"column", alignItems:"center", overflowY:"auto", padding:"0 0 40px", animation:"fadeIn 0.3s ease" }}>
      <button onClick={onClose} style={{ position:"fixed", top:"16px", right:"20px", background:"none", border:"none", color:"#444", fontSize:"24px", cursor:"pointer", zIndex:3001 }}>✕</button>

      <div style={{ width:"100%", maxWidth:"420px", padding:"48px 24px 0", textAlign:"center" }}>
        <div style={{ fontSize:"14px", letterSpacing:"0.35em", color:"#444", fontFamily:"'Courier New',monospace", marginBottom:"20px" }}>ARTIST PROFILE</div>

        {/* Photo picker — use label for reliable Android support */}
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:"12px", marginBottom:"24px" }}>
          <label htmlFor="photoInput" style={{ cursor:"pointer" }}>
            <div style={{
              width:"100px", height:"100px", borderRadius:"50%",
              border:`2px solid ${photo?"#C9A84C":"#2a2a2a"}`,
              background: photo ? "transparent" : "rgba(255,255,255,0.03)",
              display:"flex", alignItems:"center", justifyContent:"center",
              overflow:"hidden", position:"relative",
              boxShadow: photo ? "0 0 20px rgba(201,168,76,0.3)" : "none",
              transition:"all 0.3s",
            }}>
              {photo
                ? <img src={photo} alt="profile" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                : <div style={{ textAlign:"center" }}>
                    <div style={{ fontSize:"24px", marginBottom:"4px" }}>📸</div>
                    <div style={{ fontSize:"18px", color:"#444", fontFamily:"'Courier New',monospace", letterSpacing:"0.1em" }}>TAP TO ADD</div>
                  </div>
              }
            </div>
          </label>
          <input
            id="photoInput"
            type="file"
            accept="image/*"
            onChange={handlePhoto}
            style={{ display:"none" }}
          />
          {photo && (
            <button onClick={() => setPhoto(null)} style={{ fontSize:"18px", color:"#444", fontFamily:"'Courier New',monospace", background:"none", border:"none", cursor:"pointer", letterSpacing:"0.1em" }}>
              REMOVE PHOTO
            </button>
          )}
        </div>

        {/* Name field */}
        <div style={{ marginBottom:"24px" }}>
          <div style={{ fontSize:"14px", letterSpacing:"0.2em", color:"#444", fontFamily:"'Courier New',monospace", marginBottom:"8px", textAlign:"left" }}>ARTIST NAME</div>
          <input
            type="text"
            value={name}
            onChange={e => setName(e.target.value)}
            placeholder="Your name..."
            maxLength={30}
            style={{
              width:"100%", padding:"12px 14px", borderRadius:"10px",
              background:"rgba(255,255,255,0.04)", border:"1px solid #2a2a2a",
              color:"#ccc", fontFamily:"'Courier New',monospace", fontSize:"20px",
              outline:"none", letterSpacing:"0.05em",
            }}
          />
        </div>

        {/* Card style */}
        <div style={{ marginBottom:"24px" }}>
          <div style={{ fontSize:"14px", letterSpacing:"0.2em", color:"#444", fontFamily:"'Courier New',monospace", marginBottom:"10px", textAlign:"left" }}>SCORECARD STYLE</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
            {[
              { id:"circle", label:"Circle Avatar", desc:"Clean & universal", icon:"⭕" },
              { id:"full",   label:"Full Background", desc:"Bold & flamboyant", icon:"🌟" },
            ].map(style => (
              <div key={style.id}
                onClick={() => setCardStyle(style.id)}
                style={{
                  padding:"14px 12px", borderRadius:"12px", cursor:"pointer",
                  border:`2px solid ${cardStyle===style.id?"#C9A84C":"#1e1e1e"}`,
                  background: cardStyle===style.id?"rgba(201,168,76,0.08)":"rgba(255,255,255,0.02)",
                  textAlign:"center", transition:"all 0.2s",
                }}
              >
                <div style={{ fontSize:"20px", marginBottom:"6px" }}>{style.icon}</div>
                <div style={{ fontSize:"15px", color:cardStyle===style.id?"#C9A84C":"#777", fontFamily:"'Courier New',monospace", fontWeight:"bold", marginBottom:"3px" }}>{style.label}</div>
                <div style={{ fontSize:"18px", color:"#444", fontFamily:"'Courier New',monospace" }}>{style.desc}</div>
              </div>

          </div>
        </div>

        {/* Text colour presets */}
        <div style={{ marginBottom:"28px" }}>
          <div style={{ fontSize:"14px", letterSpacing:"0.2em", color:"#444", fontFamily:"'Courier New',monospace", marginBottom:"10px", textAlign:"left" }}>TEXT COLOUR</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"8px" }}>
            {TEXT_PRESETS.map(p => (
              <div key={p.id}
                onClick={() => setPreset(p.id)}
                style={{
                  padding:"10px 8px", borderRadius:"10px", cursor:"pointer",
                  border:`2px solid ${preset===p.id?p.color:"#1e1e1e"}`,
                  background: preset===p.id?`${p.pill}`:"rgba(255,255,255,0.02)",
                  textAlign:"center", transition:"all 0.2s",
                }}
              >
                <div style={{ fontSize:"16px", fontWeight:"900", color:p.color, fontFamily:"Georgia,serif", textShadow:p.shadow, marginBottom:"4px" }}>Aa</div>
                <div style={{ fontSize:"17px", color:preset===p.id?"#aaa":"#444", fontFamily:"'Courier New',monospace", letterSpacing:"0.05em" }}>{p.label}</div>
              </div>
            ))}
          </div>
          {/* Readability guarantee note */}
          <div style={{ marginTop:"8px", fontSize:"18px", color:"#333", fontFamily:"'Courier New',monospace", textAlign:"center", fontStyle:"italic" }}>
            All presets include shadow treatment for guaranteed readability over any photo
          </div>
        </div>

        {/* Preview */}
        {(photo || name) && (
          <div style={{ marginBottom:"24px" }}>
            <div style={{ fontSize:"14px", letterSpacing:"0.2em", color:"#444", fontFamily:"'Courier New',monospace", marginBottom:"10px", textAlign:"left" }}>PREVIEW</div>
            <div style={{ borderRadius:"12px", overflow:"hidden", position:"relative", height:"80px", background:"rgba(0,0,0,0.4)", border:"1px solid #1e1e1e", display:"flex", alignItems:"center", padding:"12px 16px", gap:"12px" }}>
              {photo && cardStyle === "full" && <img src={photo} alt="" style={{ position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"cover", opacity:0.4 }}/>}
              {photo && (
                <div style={{ width:"44px", height:"44px", borderRadius:"50%", overflow:"hidden", flexShrink:0, border:`2px solid ${selectedPreset.color}`, position:"relative", zIndex:1 }}>
                  <img src={photo} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                </div>
              )}
              <div style={{ position:"relative", zIndex:1 }}>
                <div style={{ fontSize:"20px", fontWeight:"900", color:selectedPreset.color, fontFamily:"Georgia,serif", textShadow:selectedPreset.shadow }}>{name || "Your Name"}</div>
                <div style={{ fontSize:"14px", color:selectedPreset.color, fontFamily:"'Courier New',monospace", opacity:0.7, textShadow:selectedPreset.shadow }}>Session Report</div>
              </div>
              <div style={{ marginLeft:"auto", position:"relative", zIndex:1 }}>
                <div style={{ fontSize:"28px", fontWeight:"900", color:selectedPreset.color, fontFamily:"Georgia,serif", textShadow:selectedPreset.shadow }}>74%</div>
                <div style={{ fontSize:"17px", color:selectedPreset.color, fontFamily:"'Courier New',monospace", textShadow:selectedPreset.shadow }}>🌟 HEADLINER</div>
              </div>
            </div>
          </div>
        )}

        {/* Music Personality Quiz */}
        <div style={{ marginBottom:"8px" }}>
          <div style={{ height:"1px", background:"linear-gradient(to right, transparent, #2a2a2a, transparent)", marginBottom:"24px" }}/>
          <MusicQuiz answers={quizAnswers} onChange={handleQuizAnswer} />
        </div>

        {/* Save */}
        <button
          onClick={handleSave}
          style={{
            width:"100%", padding:"18px", borderRadius:"14px", border:"none", cursor:"pointer",
            background:"linear-gradient(135deg, #C9A84C 0%, #a07830 100%)",
            color:"#0a0a0a", fontFamily:"'Courier New',monospace",
            fontSize:"20px", fontWeight:"900", letterSpacing:"0.2em", textTransform:"uppercase",
            boxShadow:"0 0 25px rgba(201,168,76,0.3)",
          }}
        >
          Save Profile ✦
        </button>
      </div>
    </div>
  );
}

// ── ONBOARDING MODAL ──────────────────────────────────────────────────────────
function OnboardingModal({ onClose }) {
  const [step, setStep] = React.useState(0);
  const steps = [
    {
      emoji: "🎵",
      title: "STEP 1",
      heading: "Play your song",
      body: "Open Spotify, YouTube, or anywhere you listen to music. Hit play on a song you love to sing.",
      cta: "Got it →",
    },
    {
      emoji: "🎤",
      title: "STEP 2",
      heading: "Hold your phone like a mic",
      body: "Hold your phone up near your mouth — just like you're holding a microphone. The app listens to YOU, not the music.",
      cta: "Got it →",
    },
    {
      emoji: "🌟",
      title: "STEP 3",
      heading: "Sing along and get scored",
      body: "Arm the mic, sing your heart out, and Mic Drop will score your pitch in real time. No singing lessons required.",
      cta: "Let's go 🎤",
    },
  ];
  const current = steps[step];
  const handleNext = () => {
    if (step < steps.length - 1) {
      setStep(step + 1);
    } else {
      try { localStorage.setItem("micDrop_onboarded", "1"); } catch {}
      onClose();
    }
  };
  return (
    <div style={{
      position:"fixed", inset:0, zIndex:9000,
      background:"rgba(0,0,0,0.92)",
      display:"flex", alignItems:"center", justifyContent:"center",
      padding:"24px",
    }}>
      <div style={{
        width:"100%", maxWidth:"380px",
        background:"#111",
        border:"1px solid rgba(201,168,76,0.3)",
        borderRadius:"20px",
        padding:"36px 28px 28px",
        display:"flex", flexDirection:"column", alignItems:"center",
        boxShadow:"0 0 60px rgba(201,168,76,0.1)",
        textAlign:"center",
      }}>
        {/* Step indicators */}
        <div style={{ display:"flex", gap:"8px", marginBottom:"28px" }}>
          {steps.map((_, i) => (
            <div key={i} style={{
              width: i === step ? "24px" : "8px",
              height:"8px", borderRadius:"4px",
              background: i === step ? "#C9A84C" : i < step ? "#555" : "#222",
              transition:"all 0.3s ease",
            }}/>
          ))}
        </div>
        {/* Emoji */}
        <div style={{ fontSize:"56px", marginBottom:"16px", lineHeight:1 }}>
          {current.emoji}
        </div>
        {/* Step label */}
        <div style={{
          fontSize:"11px", letterSpacing:"0.3em", color:"#C9A84C",
          fontFamily:"'Courier New',monospace", marginBottom:"10px",
          fontWeight:"bold",
        }}>
          {current.title}
        </div>
        {/* Heading */}
        <div style={{
          fontSize:"22px", fontWeight:"900", color:"#fff",
          fontFamily:"Georgia,serif", marginBottom:"14px",
          letterSpacing:"0.05em",
        }}>
          {current.heading}
        </div>
        {/* Body */}
        <div style={{
          fontSize:"15px", color:"#888", lineHeight:1.7,
          fontFamily:"'Courier New',monospace", marginBottom:"32px",
          letterSpacing:"0.05em",
        }}>
          {current.body}
        </div>
        {/* CTA Button */}
        <div
          onClick={handleNext}
          style={{
            width:"100%", padding:"14px",
            background:"linear-gradient(135deg, #C9A84C 0%, #a07830 100%)",
            borderRadius:"10px", cursor:"pointer",
            fontSize:"15px", fontWeight:"900",
            color:"#0a0a0a", fontFamily:"'Courier New',monospace",
            letterSpacing:"0.15em", textTransform:"uppercase",
            textAlign:"center",
          }}
        >
          {current.cta}
        </div>
        {/* Skip */}
        <div
          onClick={() => {
            try { localStorage.setItem("micDrop_onboarded", "1"); } catch {}
            onClose();
          }}
          style={{
            marginTop:"16px", fontSize:"12px", color:"#333",
            fontFamily:"'Courier New',monospace", cursor:"pointer",
            letterSpacing:"0.15em", textTransform:"uppercase",
          }}
        >
          skip
        </div>
      </div>
    </div>
  );
}

// ── PRO SPLASH PAGE ───────────────────────────────────────────────────────────
function ProSplash({ onClose }) {
  const [selected,    setSelected]    = useState("annual");
  const [fontScale,   setFontScale]   = useState(1.55); // 1 = normal, 1.25 = large, 1.55 = XL
  const [checkingOut, setCheckingOut] = useState(false);
  const [checkoutErr, setCheckoutErr] = useState("");

  // All font sizes run through scale so the toggle actually works
  const fs = (base) => Math.round(base * fontScale) + "px";

  const handleCheckout = async () => {
    setCheckingOut(true);
    setCheckoutErr("");
    try {
      const res = await fetch(`${PROXY_BASE_URL}/create-checkout`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          planId:     selected,
          successUrl: `${window.location.origin}${window.location.pathname}?payment=success`,
          cancelUrl:  `${window.location.origin}${window.location.pathname}?payment=cancelled`,
        }),
      });
      const data = await res.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        setCheckoutErr("Payment unavailable — please try again or email us.");
        setCheckingOut(false);
      }
    } catch {
      setCheckoutErr("Connection error — check your internet and try again.");
      setCheckingOut(false);
    }
  };

  const plans = [
    { id:"monthly", label:"1 Month",  price:"$2.99",  saving:null },
    { id:"quarter", label:"3 Months", price:"$7.99",  saving:"11% off" },
    { id:"biannual",label:"6 Months", price:"$14.99", saving:"16% off" },
    { id:"annual",  label:"1 Year",   price:"$24.99", saving:"30% off — best value" },
  ];

  // Animated pitch graph — gold reference line, red singer line
  const W = 320, H = 90, mid = H/2;
  const refPoints  = [28,26,29,27,28,26,28,27,29,28,27,28,26,29,27,28,27,26,28,27];
  const singPoints = [35,28,42,26,30,38,24,32,44,27,36,29,40,25,33,38,26,35,28,31];
  const toPath = (pts) => pts.map((v,i) => {
    const x = (i/(pts.length-1))*W;
    const y = mid + (v - mid) * 1.4;
    return `${i===0?"M":"L"}${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");

  return (
    <div style={{
      position:"fixed", inset:0, zIndex:2000,
      background:"rgba(0,0,0,0.96)",

      <div style={{ width:"100%", maxWidth:"420px", padding:"48px 24px 24px", textAlign:"center" }}>
        <div style={{ fontSize:fs(11), letterSpacing:"0.35em", color:"#444", fontFamily:"'Courier New',monospace", marginBottom:"16px" }}>MIC DROP PRO</div>

// ── PITCH GRAPH ───────────────────────────────────────────────────────────────
function PitchGraph({ samples }) {
  if (!samples || samples.length < 10) {
    return (
      <div style={{ height:"80px", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <span style={{ fontSize:"13px", color:"#333", fontFamily:"'Courier New',monospace", letterSpacing:"0.15em" }}>
          NOT ENOUGH DATA — SING LONGER NEXT TIME
        </span>
      </div>
    );
  }

  const W = 340, H = 80;
  const MAX_CENTS = 100;
  // Downsample to max 120 points for performance
  const step    = Math.max(1, Math.floor(samples.length / 120));
  const pts     = samples.filter((_, i) => i % step === 0);
  const toX     = (i) => (i / (pts.length - 1)) * W;
  const toY     = (c) => H/2 - (Math.max(-MAX_CENTS, Math.min(MAX_CENTS, c)) / MAX_CENTS) * (H/2 - 6);

  // Build polyline points, split into coloured segments
  const pocketPts = [], sharpPts = [], flatPts = [];
  pts.forEach((s, i) => {
    const x = toX(i), y = toY(s.cents);
    const a = Math.abs(s.cents);
    if (a <= POCKET_CENTS)      pocketPts.push(`${x},${y}`);
    else if (s.cents > 0) sharpPts.push(`${x},${y}`);
    else                   flatPts.push(`${x},${y}`);
  });

  // Full line path for smooth rendering
  const linePts = pts.map((s, i) => `${toX(i)},${toY(s.cents)}`).join(" ");
  const midY    = toY(0);
  const pocketTop = toY(POCKET_CENTS), pocketBot = toY(-POCKET_CENTS);

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:"block", borderRadius:"8px", background:"rgba(0,0,0,0.3)" }}>
      {/* Pocket zone — gold band */}
      <rect x={0} y={pocketTop} width={W} height={pocketBot - pocketTop} fill="rgba(201,168,76,0.08)" />
      {/* Centre line */}
      <line x1={0} y1={midY} x2={W} y2={midY} stroke="#2a2a2a" strokeWidth="1" />
      {/* Pocket boundary lines */}
      <line x1={0} y1={pocketTop} x2={W} y2={pocketTop} stroke="rgba(201,168,76,0.2)" strokeWidth="1" strokeDasharray="4,4" />
      <line x1={0} y1={pocketBot} x2={W} y2={pocketBot} stroke="rgba(201,168,76,0.2)" strokeWidth="1" strokeDasharray="4,4" />
      {/* Pitch line — colour by zone using gradient trick: draw full line then overlay zones */}
      <polyline points={linePts} fill="none" stroke="#555" strokeWidth="1.5" strokeLinejoin="round" />
      {/* Gold overlay for pocket points */}
      {pts.map((s, i) => Math.abs(s.cents) <= POCKET_CENTS && (
        <circle key={i} cx={toX(i)} cy={toY(s.cents)} r="1.8" fill="#C9A84C" />
      ))}
      {/* Red overlay for off-pitch points */}
      {pts.map((s, i) => Math.abs(s.cents) > POCKET_CENTS && (
        <circle key={`r${i}`} cx={toX(i)} cy={toY(s.cents)} r="1.5" fill="#ff2200" />
      ))}
      {/* Labels */}
      <text x="3" y="10" fontSize="8" fill="#333" fontFamily="monospace">SHARP</text>
      <text x="3" y={H-3} fontSize="8" fill="#333" fontFamily="monospace">FLAT</text>
      <text x={W-34} y={midY-3} fontSize="8" fill="rgba(201,168,76,0.4)" fontFamily="monospace">POCKET</text>
    </svg>
  );
}

// ── PITCH BREAKDOWN BARS ──────────────────────────────────────────────────────
function PitchBreakdown({ samples }) {
  if (!samples || samples.length === 0) return null;
  const pocket = samples.filter(s => Math.abs(s.cents) <= POCKET_CENTS).length;
  const sharp  = samples.filter(s => s.cents >  POCKET_CENTS).length;
  const flat   = samples.filter(s => s.cents < -POCKET_CENTS).length;
  const total  = samples.length;
  const pPct   = Math.round((pocket / total) * 100);
  const sPct   = Math.round((sharp  / total) * 100);
  const fPct   = Math.round((flat   / total) * 100);

  return (
    <div style={{ marginTop:"10px" }}>
      <div style={{ fontSize:"11px", letterSpacing:"0.2em", color:"#444", fontFamily:"'Courier New',monospace", marginBottom:"6px" }}>PITCH BREAKDOWN</div>
      {/* Bar */}
      <div style={{ display:"flex", height:"10px", borderRadius:"5px", overflow:"hidden", gap:"1px" }}>
        {sPct > 0 && <div style={{ width:`${sPct}%`, background:"#ff6633", transition:"width 0.6s" }}/>}
        {pPct > 0 && <div style={{ width:`${pPct}%`, background:"#C9A84C", transition:"width 0.6s" }}/>}
        {fPct > 0 && <div style={{ width:`${fPct}%`, background:"#2E6DA4", transition:"width 0.6s" }}/>}
      </div>
      {/* Legend */}
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:"5px" }}>
        <span style={{ fontSize:"11px", color:"#ff6633", fontFamily:"'Courier New',monospace" }}>▲ SHARP {sPct}%</span>
        <span style={{ fontSize:"11px", color:"#C9A84C", fontFamily:"'Courier New',monospace" }}>✦ POCKET {pPct}%</span>
        <span style={{ fontSize:"11px", color:"#2E6DA4", fontFamily:"'Courier New',monospace" }}>▼ FLAT {fPct}%</span>
      </div>
    </div>
  );
}

// ── DRESSING ROOM ─────────────────────────────────────────────────────────────
const MAX_RECEIPTS = 9;

// ── SERVER-SIDE RECEIPT STORAGE ──────────────────────────────────────────────
// Receipts stored in Cloudflare KV via worker, keyed to Pro token
// localStorage used as fast local cache — server is source of truth

function getStoredToken() {
  try { return localStorage.getItem("micDrop_proToken") || null; }
  catch { return null; }
}

function loadDressingRoom() {
  try {
    const raw = localStorage.getItem("micDrop_dressingRoom");
    return raw ? JSON.parse(raw) : { backdrop: null, receipts: [] };
  } catch { return { backdrop: null, receipts: [] }; }
}

function saveDressingRoom(data) {
  try { localStorage.setItem("micDrop_dressingRoom", JSON.stringify(data)); } catch {}
}

// Sync receipts FROM server into localStorage cache
async function syncReceiptsFromServer(token) {
  try {
    const res = await fetch(`${PROXY_BASE_URL}/receipts?token=${encodeURIComponent(token)}`);
    if (!res.ok) return;
    const data = await res.json();
    if (Array.isArray(data.receipts)) {
      const room = loadDressingRoom();
      room.receipts = data.receipts;
      saveDressingRoom(room);
    }
  } catch { /* silent — use local cache */ }
}

// Save a receipt to server AND local cache
async function saveReceiptToServer(token, receipt) {
  if (!token) return;
  try {
    await fetch(`${PROXY_BASE_URL}/receipts`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, receipt }),
    });
  } catch { /* silent — receipt already in local cache */ }
}

// Delete a receipt from server AND local cache
async function deleteReceiptFromServer(token, id) {
  if (!token) return;
  try {
    await fetch(`${PROXY_BASE_URL}/receipts`, {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, id }),
    });
  } catch { /* silent */ }
}

// Called from SessionReport — saves a receipt thumbnail to the Dressing Room
async function saveReceiptToDressingRoom(reportEl, songTitle, artist, accuracy, grade) {
  try {
    const canvas = await html2canvas(reportEl, {
      backgroundColor: "#0a0a0a", scale: 1, useCORS: true, logging: false,
    });
    // Compress to thumbnail — max 300px wide
    const thumb = document.createElement("canvas");
    const ratio  = Math.min(1, 300 / canvas.width);
    thumb.width  = Math.round(canvas.width  * ratio);
    thumb.height = Math.round(canvas.height * ratio);
    thumb.getContext("2d").drawImage(canvas, 0, 0, thumb.width, thumb.height);
    const thumbnail = thumb.toDataURL("image/jpeg", 0.7);

    const room = loadDressingRoom();
    const receipt = {
      id:         Date.now(),
      thumbnail,
      title:      songTitle,
      artist,
      accuracy,
      grade:      grade.label,
      gradeColor: grade.color,
      date:       new Date().toLocaleDateString("en-AU", { day:"numeric", month:"short", year:"numeric" }),
    };
    // Save to local cache first — fast
    room.receipts = [receipt, ...room.receipts].slice(0, MAX_RECEIPTS);
    saveDressingRoom(room);
    // Save to server in background — receipts survive device/browser clears
    const token = getStoredToken();
    if (token) saveReceiptToServer(token, receipt);
    return true;
  } catch { return false; }
}

function DressingRoom({ onClose, isPro, proToken }) {
  const [room,        setRoom]        = useState(() => loadDressingRoom());
  const [viewing,     setViewing]     = useState(null);
  const [saving,      setSaving]      = useState(false);
  const backdropRef = useRef(null);

  // Sync receipts from server when Backstage opens
  useEffect(() => {
    if (proToken) {
      syncReceiptsFromServer(proToken).then(() => {
        setRoom(loadDressingRoom());
      });
    }
  }, [proToken]);

  const handleBackdrop = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onloadend = () => {
      // Compress backdrop — draw to canvas at max 800px wide
      const img = new Image();
      img.onload = () => {
        const cvs = document.createElement("canvas");
        const ratio = Math.min(1, 800 / img.width);
        cvs.width  = Math.round(img.width  * ratio);
        cvs.height = Math.round(img.height * ratio);
        cvs.getContext("2d").drawImage(img, 0, 0, cvs.width, cvs.height);
        const compressed = cvs.toDataURL("image/jpeg", 0.75);
        const updated = { ...room, backdrop: compressed };
        setRoom(updated);
        saveDressingRoom(updated);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  };

  const removeBackdrop = () => {

            ? <img src={room.backdrop} alt="backdrop" style={{ width:"100%", height:"100%", objectFit:"cover", opacity:0.7 }}/>
            : <div style={{ width:"100%", height:"100%", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"8px", border:"1px dashed #2a2a2a" }}>

              {room.receipts.length > 0 ? `${room.receipts.length} receipt${room.receipts.length!==1?"s":""} on the wall` : "Your wall is empty — go perform."}

          </div>
          {/* Backdrop controls — bottom left, away from close button */}
          <div style={{ position:"absolute", top:"12px", left:"16px", display:"flex", flexDirection:"row", gap:"6px" }}>

            )}
          </div>
          <input id="backdropInput" type="file" accept="image/*" onChange={handleBackdrop} style={{ display:"none" }} ref={backdropRef}/>
        </div>
      </div>

      {/* Wall of Receipts */}
      <div style={{ width:"100%", maxWidth:"420px", padding:"16px 20px" }}>
        {room.receipts.length === 0 ? (
          <div style={{ textAlign:"center", padding:"40px 0" }}>

}


function SessionReport({ songs, onClose, onUnlock, isPro }) {
  const reportRef = useRef(null);
  const [snapping, setSnapping] = useState(false);

  const dropTheReceipts = async () => {
    if (!reportRef.current || snapping) return;
    setSnapping(true);
    try {
      const canvas = await html2canvas(reportRef.current, {
        backgroundColor: "#0a0a0a",
        scale: 2,
        useCORS: true,
        logging: false,
      });
      canvas.toBlob(async (blob) => {
        try {
          const file = new File([blob], "mic-drop-performance.png", { type:"image/png" });
          if (navigator.share && navigator.canShare && navigator.canShare({ files:[file] })) {
            // Web Share API — lets user choose save to Photos, WhatsApp, etc
            await navigator.share({
              files: [file],
              title: "Mic Drop Performance",
              text: "Check out my Mic Drop receipt! 🎤 #DropTheReceipts",
            });
          } else {
            // Fallback — create object URL and trigger download
            const url = URL.createObjectURL(blob);
            const a   = document.createElement("a");
            a.href     = url;
            a.download = "mic-drop-performance.png";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
          }
        } catch(shareErr) {
          // User cancelled share or share failed — silent fail is fine
          console.log("Share cancelled or failed:", shareErr);
        }
      }, "image/png");
    } catch(e) {
      console.error("Snapshot failed:", e);
    } finally {
      setSnapping(false);
    }
  };

  const sessionAccuracy = songs.length > 0
    ? Math.round(songs.reduce((s, g) => s + g.accuracy, 0) / songs.length) : null;

  return (
    <div className="report-card" style={{ width:"100%", maxWidth:"420px", padding:"0 20px 16px" }}>
      <div ref={reportRef} style={{ background:"rgba(14,14,14,0.98)", border:"1px solid #1e1e1e", borderRadius:"16px", overflow:"hidden" }}>

        {/* Header */}
        <div style={{ padding:"16px 16px 12px", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:"1px solid #1a1a1a" }}>
          <div>
            <div style={{ fontSize:"14px", letterSpacing:"0.3em", color:"#444", fontFamily:"'Courier New',monospace" }}>
              {isPro ? "✦ PRO REPORT" : "SESSION REPORT"}
            </div>
            <div style={{ fontSize:"18px", color:"#2a2a2a", fontFamily:"'Courier New',monospace", marginTop:"3px" }}>
              {songs.length} song{songs.length!==1?"s":""} this session
              {sessionAccuracy !== null && <span style={{ color:"#555", marginLeft:"8px" }}>· {sessionAccuracy}% avg</span>}
            </div>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"#333", fontSize:"18px", cursor:"pointer" }}>✕</button>
        </div>

        {/* Song list */}
        <div style={{ padding:"10px 0" }}>
          {songs.length === 0 ? (
            <div style={{ padding:"20px", textAlign:"center", fontSize:"14px", color:"#2a2a2a", fontFamily:"'Courier New',monospace", letterSpacing:"0.15em" }}>
              NO SONGS LOGGED YET
            </div>
          ) : isPro ? (
            // PRO — expandable cards with graph + breakdown + coaching
            songs.map((song, i) => <ProSongCard key={i} song={song} />)
          ) : (
            // FREE — scores only
            songs.map((song, i) => {
              const col   = scoreColor(song.accuracy);
              const grade = gradeFromAccuracy(song.accuracy);
              return (
                <div key={i} style={{ padding:"10px 16px", borderBottom:"1px solid #111", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div style={{ flex:1, minWidth:0, marginRight:"12px" }}>
                    <div style={{ fontSize:"20px", color:"#ddd", fontFamily:"'Courier New',monospace", fontWeight:"bold", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{song.title}</div>
                    <div style={{ fontSize:"17px", color:"#777", fontFamily:"'Courier New',monospace", marginTop:"2px", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{song.artist}</div>
                  </div>
                  <div style={{ textAlign:"right", flexShrink:0 }}>
                    <div style={{ fontSize:"20px", fontWeight:"900", color:col, fontFamily:"Georgia,serif", lineHeight:1, textShadow:`0 0 12px ${col}66` }}>{song.accuracy}%</div>
                    <div style={{ fontSize:"17px", color:col, fontFamily:"'Courier New',monospace", marginTop:"2px", opacity:0.7 }}>{grade.label}</div>
                  </div>
                </div>
              );
            })
          )}
        </div>

        {/* PRO UPSELL — only shown after trial expires */}
        {!isPro && (
          <div style={{ position:"relative", borderTop:"1px solid #1a1a1a" }}>
            <div className="pro-blur" style={{ padding:"14px 16px" }}>
              <div style={{ fontSize:"14px", color:"#555", fontFamily:"'Courier New',monospace", letterSpacing:"0.2em", marginBottom:"10px" }}>PITCH TIMELINE</div>
              <div style={{ height:"60px", background:"rgba(0,0,0,0.3)", borderRadius:"8px", overflow:"hidden" }}>
                <svg width="100%" height="60" style={{ display:"block" }}>
                  <path d="M0,30 C40,20 60,40 100,25 S160,35 200,22 S260,38 300,28 S340,20 380,30" stroke="#C9A84C" strokeWidth="2" fill="none" opacity="0.6"/>
                  <path d="M0,35 C30,45 70,25 110,38 S170,22 210,35 S270,28 310,40 S350,30 380,35" stroke="#ff2200" strokeWidth="2" fill="none" opacity="0.4"/>
                </svg>
              </div>
              <div style={{ marginTop:"10px", display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
                <div style={{ background:"rgba(0,0,0,0.3)", borderRadius:"8px", padding:"8px", fontSize:"18px", color:"#333", fontFamily:"'Courier New',monospace" }}>PITCH BREAKDOWN<br/><span style={{ color:"#1a1a1a" }}>Pocket 78% · Sharp 12%</span></div>
                <div style={{ background:"rgba(0,0,0,0.3)", borderRadius:"8px", padding:"8px", fontSize:"18px", color:"#333", fontFamily:"'Courier New',monospace" }}>CLAUDE COACHING<br/><span style={{ color:"#1a1a1a" }}>Support your chest voice...</span></div>
              </div>
            </div>
            <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:"rgba(10,10,10,0.7)", backdropFilter:"blur(1px)", padding:"16px" }}>
              <div style={{ fontSize:"14px", letterSpacing:"0.2em", color:"#555", fontFamily:"'Courier New',monospace", marginBottom:"8px", textAlign:"center" }}>
                PITCH TIMELINE · COACHING · DROP THE RECEIPTS
              </div>
              <button onClick={onUnlock} style={{ padding:"14px 28px", borderRadius:"12px", background:"linear-gradient(135deg, #C9A84C 0%, #a07830 100%)", border:"none", color:"#0a0a0a", fontFamily:"'Courier New',monospace", fontSize:"18px", fontWeight:"900", letterSpacing:"0.2em", cursor:"pointer", textTransform:"uppercase", boxShadow:"0 0 25px rgba(201,168,76,0.4)" }}>
                Unlock Pro ✦
              </button>
              <div style={{ fontSize:"17px", color:"#2a2a2a", fontFamily:"'Courier New',monospace", marginTop:"8px", textAlign:"center", letterSpacing:"0.1em", lineHeight:1.8 }}>
                FROM $2.99 · NO APP STORE · OPT-IN ONLY
              </div>
            </div>
          </div>
        )}

        {/* Footer */}
        <div style={{ padding:"10px 16px", textAlign:"center", borderTop:"1px solid #111" }}>
          <div style={{ fontSize:"17px", color:"#1c1c1c", fontFamily:"'Courier New',monospace", letterSpacing:"0.15em" }}>
            Simon Cowell standard: 90% · Whitney Houston: unreachable
          </div>
        </div>

      </div>

      {/* DROP THE RECEIPTS + SAVE TO DRESSING ROOM — Pro only */}
      {isPro && songs.length > 0 && (
        <div style={{ marginTop:"10px", padding:"0 4px", display:"flex", flexDirection:"column", gap:"8px" }}>
          <button
            onClick={dropTheReceipts}
            disabled={snapping}
            style={{
              width:"100%", padding:"14px", borderRadius:"12px", border:"none",
              cursor: snapping ? "not-allowed" : "pointer",
              background: snapping
                ? "linear-gradient(135deg, #555 0%, #333 100%)"
                : "linear-gradient(135deg, #C9A84C 0%, #a07830 100%)",
              color:"#0a0a0a", fontFamily:"'Courier New',monospace",
              fontSize:"15px", fontWeight:"900", letterSpacing:"0.2em",
              textTransform:"uppercase",
              boxShadow: snapping ? "none" : "0 0 20px rgba(201,168,76,0.3)",
              transition:"all 0.2s",
            }}
          >
            {snapping ? "◈  Capturing..." : "📸  Drop the Receipts"}
          </button>
          <button
            onClick={async () => {
              if (!reportRef.current || snapping) return;
              setSnapping(true);
              // Save best song to dressing room
              const best = [...songs].sort((a,b) => b.accuracy - a.accuracy)[0];
              const grade = gradeFromAccuracy(best.accuracy);
              const ok = await saveReceiptToDressingRoom(reportRef.current, best.title, best.artist, best.accuracy, grade);
              setSnapping(false);
              alert(ok ? `✦ Pinned to your Dressing Room — ${best.accuracy}% on ${best.title}` : "Couldn't save — try again.");
            }}
            disabled={snapping}
            style={{
              width:"100%", padding:"12px", borderRadius:"12px", border:"1px solid rgba(201,168,76,0.25)",
              cursor: snapping ? "not-allowed" : "pointer",
              background:"rgba(201,168,76,0.06)",
              color:"#C9A84C", fontFamily:"'Courier New',monospace",
              fontSize:"14px", fontWeight:"900", letterSpacing:"0.2em",
              textTransform:"uppercase", transition:"all 0.2s",
            }}
          >
            🎭  Save to Dressing Room
          </button>
        </div>
      )}
    </div>
  );
}

// ── TOKEN ENTRY ───────────────────────────────────────────────────────────────
function TokenEntry({ onActivate }) {
  const [open,    setOpen]    = useState(false);
  const [token,   setToken]   = useState("");
  const [status,  setStatus]  = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    if (!token.trim()) return;
    setLoading(true);
    setStatus("");
    try {
      const res = await fetch(`${PROXY_BASE_URL}/verify-token`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: token.trim() }),
      });
      const data = await res.json();
      if (data.valid) {
        setStatus("✦ Token valid!");
        setTimeout(() => {
          setOpen(false);
          setToken("");
          setStatus("");
          onActivate(data.days, token.trim());
        }, 1000);
      } else {
        setStatus("Invalid token — please check and try again");
      }
    } catch {
      setStatus("Something went wrong — email us at scvdappcreator@gmail.com");
    } finally {
      setLoading(false);
    }
  };

  if (!open) return (
    <button
      onClick={() => setOpen(true)}
      style={{ fontSize:"18px", color:"#C9A84C", fontFamily:"'Courier New',monospace", letterSpacing:"0.12em", background:"none", border:"none", cursor:"pointer", textDecoration:"underline", textDecorationColor:"rgba(201,168,76,0.4)", opacity:0.85 }}
    >
      ✦ Have a token? Enter it here
    </button>
  );

  return (
    <div style={{ width:"100%", background:"rgba(201,168,76,0.05)", border:"1px solid rgba(201,168,76,0.15)", borderRadius:"12px", padding:"14px 16px" }}>
      <div style={{ fontSize:"14px", letterSpacing:"0.2em", color:"#555", fontFamily:"'Courier New',monospace", marginBottom:"10px", textAlign:"center" }}>ENTER ACCESS TOKEN</div>
      <div style={{ display:"flex", gap:"8px" }}>
        <input
          type="text"
          value={token}
          onChange={e => setToken(e.target.value)}
          placeholder="micdrop_pro_..."
          style={{
            flex:1, padding:"10px 12px", borderRadius:"8px",
            background:"rgba(255,255,255,0.04)", border:"1px solid #2a2a2a",
            color:"#aaa", fontFamily:"'Courier New',monospace", fontSize:"17px",
            outline:"none",
          }}
        />
        <button
          onClick={handleSubmit}
          disabled={loading || !token.trim()}
          style={{
            padding:"10px 16px", borderRadius:"8px", border:"none", cursor:"pointer",
            background:"linear-gradient(135deg, #C9A84C 0%, #a07830 100%)",
            color:"#0a0a0a", fontFamily:"'Courier New',monospace",
            fontSize:"17px", fontWeight:"900", opacity: loading||!token.trim() ? 0.5 : 1,
          }}
        >
          {loading ? "..." : "✦"}
        </button>
      </div>
      {status && (
        <div style={{ marginTop:"8px", fontSize:"14px", color: status.includes("valid!") ? "#C9A84C" : "#ff4422", fontFamily:"'Courier New',monospace", textAlign:"center" }}>
          {status}
        </div>
      )}
      <button onClick={() => { setOpen(false); setToken(""); setStatus(""); }} style={{ width:"100%", marginTop:"8px", fontSize:"18px", color:"#333", background:"none", border:"none", cursor:"pointer", fontFamily:"'Courier New',monospace" }}>
        cancel
      </button>
    </div>
  );
}
